<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMEN://SCIENCE</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="shell" id="shell">
    <header class="top" data-drag>
      <div class="brand">
        <span class="title">LUMEN://SCIENCE</span><span class="cursor" aria-hidden="true"></span>
        <span class="ver" id="verLabel"></span>
      </div>
      <button class="ghost" id="quitBtn" type="button">EXIT</button>
    </header>

    <div class="telemetry" id="telemetry" aria-live="polite">
      <span class="kv">PROVIDER <b id="telProvider">—</b></span>
      <span class="sep">|</span>
      <span class="kv">PROXY <b id="telProxy">:—</b></span>
      <span class="sep">|</span>
      <span class="kv">SANDBOX <b id="telSandbox">:—</b></span>
      <span class="sep">|</span>
      <span class="kv">MODE <b id="telMode">—</b></span>
      <span class="sep">|</span>
      <span class="kv">UPTIME <b id="telUptime">00:00:00</b></span>
    </div>

    <section class="modes">
      <button class="seg active" data-mode="proxy" type="button">THIRD_PARTY</button>
      <button class="seg" data-mode="official" type="button">OFFICIAL</button>
    </section>

    <p class="hint official-only">[INFO] 官方模式直连 Claude Science 订阅，Lumen 不托管官方登录态。</p>

    <section class="card tp-only">
      <div class="card-hd">ROUTE // PROVIDER</div>
      <select id="provider"></select>
    </section>

    <section class="card tp-only">
      <div class="card-hd">AUTH // API_KEY</div>
      <label id="keyLabel">API Key</label>
      <div class="row">
        <input id="keyInput" type="password" placeholder="paste key — local only" autocomplete="off" />
        <button class="btn" id="saveKeyBtn" type="button">SAVE</button>
        <button class="btn" id="verifyKeyBtn" type="button">VERIFY</button>
      </div>
    </section>

    <details class="card adv tp-only">
      <summary>ADVANCED</summary>
      <div class="grid2">
        <div><label>PROXY_PORT</label><input id="proxyPort" inputmode="numeric" /></div>
        <div><label>SANDBOX_PORT</label><input id="sandboxPort" inputmode="numeric" /></div>
      </div>
      <label class="chk"><input type="checkbox" id="cacheBoost" checked /> DEEPSEEK_CACHE_BOOST</label>
    </details>

    <section class="card">
      <div class="card-hd">CONTROL // RUNTIME</div>
      <button class="hero" id="heroBtn" type="button">INIT_SEQUENCE</button>
      <div class="row">
        <button class="btn wide" id="stopBtn" type="button">HALT_ALL</button>
      </div>
    </section>

    <section class="card tp-only">
      <div class="status-hd">
        <div class="lights">
          <div id="stProxy"><span class="badge warn" id="bdProxy">[—]</span>PROXY</div>
          <div id="stSandbox"><span class="badge warn" id="bdSandbox">[—]</span>SANDBOX</div>
          <div id="stUpstream"><span class="badge warn" id="bdUpstream">[—]</span>UPSTREAM</div>
        </div>
        <span class="conn" id="connDot">[SSE]</span>
      </div>
      <a class="url-bar" id="urlBar" href="#" target="_blank" rel="noopener" hidden></a>
      <div class="cache" id="cacheBar" hidden>
        <div class="cache-fill" id="cacheFill"></div>
        <span class="cache-txt" id="cacheTxt">CACHE 0%</span>
      </div>
      <div class="msg" id="msg">[READY] awaiting operator input</div>
    </section>

    <footer class="foot">
      <button class="link" id="openBrowserBtn" type="button">OPEN_SCIENCE</button>
      <button class="link" id="doctorBtn" type="button">DIAGNOSTIC</button>
      <button class="link" id="logsBtn" type="button">LOGS</button>
      <button class="link" id="researchBtn" type="button">RESEARCH_PACK</button>
      <button class="link" id="updateBtn" type="button">UPDATE</button>
      <button class="link" id="reportBtn" type="button">REPORT</button>
    </footer>

    <dialog id="modal">
      <div class="modal-hd">
        <span id="modalTitle">LOG</span>
        <div class="modal-tabs" id="modalTabs" hidden>
          <button type="button" data-log="proxy" class="tab active">PROXY</button>
          <button type="button" data-log="sandbox" class="tab">SANDBOX</button>
        </div>
        <button id="modalClose" type="button">X</button>
      </div>
      <pre id="modalBody"></pre>
    </dialog>
  </div>
  <script src="/assets/app.js" defer></script>
</body>
</html>
