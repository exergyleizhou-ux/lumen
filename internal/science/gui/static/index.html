<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen Science</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="shell" id="shell">
    <header class="top" data-drag>
      <div class="brand">
        <span class="pulse" id="brandDot"></span>
        <span class="title">Lumen Science</span>
        <span class="ver" id="verLabel"></span>
      </div>
      <button class="ghost" id="quitBtn" type="button">退出面板</button>
    </header>

    <section class="modes">
      <button class="seg active" data-mode="proxy" type="button">第三方模型</button>
      <button class="seg" data-mode="official" type="button">官方 Claude</button>
    </section>

    <p class="hint official-only">官方模式：打开你真实的 Claude Science 与订阅，Lumen 不托管官方登录。</p>

    <section class="card tp-only">
      <label>模型线路</label>
      <select id="provider"></select>
    </section>

    <section class="card tp-only">
      <label id="keyLabel">API Key</label>
      <div class="row">
        <input id="keyInput" type="password" placeholder="粘贴 key（仅存本地）" autocomplete="off" />
        <button class="btn" id="saveKeyBtn" type="button">保存</button>
        <button class="btn" id="verifyKeyBtn" type="button">验证</button>
      </div>
    </section>

    <details class="card adv tp-only">
      <summary>高级设置</summary>
      <div class="grid2">
        <div><label>代理端口</label><input id="proxyPort" inputmode="numeric" /></div>
        <div><label>沙箱端口</label><input id="sandboxPort" inputmode="numeric" /></div>
      </div>
      <label class="chk"><input type="checkbox" id="cacheBoost" checked /> DeepSeek 缓存增强</label>
    </details>

    <section class="card">
      <button class="hero" id="heroBtn" type="button">一键开始</button>
      <div class="row">
        <button class="btn wide" id="stopBtn" type="button">全部停止</button>
      </div>
    </section>

    <section class="card tp-only">
      <div class="status-hd">
        <div class="lights">
          <div><span class="lt amber" id="ltProxy"></span>代理</div>
          <div><span class="lt amber" id="ltSandbox"></span>沙箱</div>
          <div><span class="lt amber" id="ltUpstream"></span>上游</div>
        </div>
        <span class="conn" id="connDot" title="实时连接">●</span>
      </div>
      <a class="url-bar" id="urlBar" href="#" target="_blank" rel="noopener" hidden></a>
      <div class="cache" id="cacheBar" hidden>
        <div class="cache-fill" id="cacheFill"></div>
        <span class="cache-txt" id="cacheTxt">缓存 0%</span>
      </div>
      <div class="msg" id="msg">就绪</div>
    </section>

    <footer class="foot">
      <button class="link" id="openBrowserBtn" type="button">打开 Science ↗</button>
      <button class="link" id="doctorBtn" type="button">自检</button>
      <button class="link" id="logsBtn" type="button">日志</button>
      <button class="link" id="researchBtn" type="button">科研资源</button>
      <button class="link" id="updateBtn" type="button">检查更新</button>
      <button class="link" id="reportBtn" type="button">反馈</button>
    </footer>

    <dialog id="modal">
      <div class="modal-hd">
        <span id="modalTitle">日志</span>
        <div class="modal-tabs" id="modalTabs" hidden>
          <button type="button" data-log="proxy" class="tab active">代理</button>
          <button type="button" data-log="sandbox" class="tab">沙箱</button>
        </div>
        <button id="modalClose" type="button">✕</button>
      </div>
      <pre id="modalBody"></pre>
    </dialog>
  </div>
  <script src="/assets/app.js" defer></script>
</body>
</html>
