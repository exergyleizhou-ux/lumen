<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen Science</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="shell" id="shell">
    <header class="top" data-drag>
      <div class="brand">
        <span class="orb" id="brandDot" aria-hidden="true"></span>
        <div class="brand-text">
          <span class="title">Lumen Science</span>
          <span class="kicker">science runtime · lumen</span>
        </div>
        <span class="ver" id="verLabel"></span>
      </div>
      <button class="ghost" id="quitBtn" type="button">退出</button>
    </header>

    <div class="telemetry" id="telemetry" aria-live="polite">
      <span class="chip"><span class="chip-k">线路</span><b id="telProvider">—</b></span>
      <span class="chip mono"><span class="chip-k">代理</span><b id="telProxy">:—</b></span>
      <span class="chip mono"><span class="chip-k">沙箱</span><b id="telSandbox">:—</b></span>
      <span class="chip"><span class="chip-k">模式</span><b id="telMode">—</b></span>
      <span class="chip mono"><span class="chip-k">运行</span><b id="telUptime">00:00:00</b></span>
    </div>

    <section class="modes" role="tablist">
      <span class="modes-glider" id="modeGlider" aria-hidden="true"></span>
      <button class="seg active" data-mode="proxy" type="button" role="tab">第三方模型</button>
      <button class="seg" data-mode="official" type="button" role="tab">官方 Claude</button>
    </section>

    <p class="hint official-only">官方模式直连你的 Claude Science 订阅，Lumen 不托管官方登录。</p>

    <section class="card tp-only reveal">
      <p class="section-kicker">route</p>
      <label class="field-label">模型线路</label>
      <select id="provider"></select>
    </section>

    <section class="card tp-only reveal">
      <p class="section-kicker">auth</p>
      <label class="field-label" id="keyLabel">API Key</label>
      <div class="row">
        <input id="keyInput" type="password" placeholder="粘贴 key，仅存本地" autocomplete="off" />
        <button class="btn" id="saveKeyBtn" type="button">保存</button>
        <button class="btn outline" id="verifyKeyBtn" type="button">验证</button>
      </div>
    </section>

    <details class="card adv tp-only reveal">
      <summary>高级设置</summary>
      <div class="grid2">
        <div><label class="field-label">代理端口</label><input id="proxyPort" inputmode="numeric" /></div>
        <div><label class="field-label">沙箱端口</label><input id="sandboxPort" inputmode="numeric" /></div>
      </div>
      <label class="chk"><input type="checkbox" id="cacheBoost" checked /> DeepSeek 缓存增强</label>
    </details>

    <section class="card control reveal">
      <button class="hero" id="heroBtn" type="button">
        <span class="hero-label">一键开始</span>
      </button>
      <button class="btn wide subtle" id="stopBtn" type="button">全部停止</button>
    </section>

    <section class="card status-card tp-only reveal">
      <div class="status-hd">
        <p class="section-kicker">runtime</p>
        <span class="conn" id="connDot" title="实时连接">实时</span>
      </div>
      <div class="lights">
        <div class="light" id="stProxy">
          <span class="dot amber" id="dotProxy"></span>
          <span class="light-name">代理</span>
          <span class="light-state" id="stateProxy">待机</span>
        </div>
        <div class="light sandbox-cell" id="stSandbox">
          <span class="dot amber" id="dotSandbox"></span>
          <span class="light-name">沙箱</span>
          <span class="light-state" id="stateSandbox">待机</span>
        </div>
        <div class="light" id="stUpstream">
          <span class="dot amber" id="dotUpstream"></span>
          <span class="light-name">上游</span>
          <span class="light-state" id="stateUpstream">待机</span>
        </div>
      </div>
      <a class="url-bar" id="urlBar" href="#" target="_blank" rel="noopener" hidden>
        <span class="url-text"></span>
        <span class="url-arrow" aria-hidden="true">→</span>
      </a>
      <div class="cache-wrap" id="cacheBar" hidden>
        <div class="cache">
          <div class="cache-fill" id="cacheFill"></div>
        </div>
        <span class="cache-txt mono" id="cacheTxt">缓存 0%</span>
      </div>
      <div class="msg" id="msg">就绪，随时可以启动</div>
    </section>

    <footer class="foot">
      <button class="link" id="openBrowserBtn" type="button">打开 Science</button>
      <button class="link" id="doctorBtn" type="button">自检</button>
      <button class="link" id="logsBtn" type="button">日志</button>
      <button class="link" id="researchBtn" type="button">科研资源</button>
      <button class="link" id="updateBtn" type="button">更新</button>
      <button class="link" id="reportBtn" type="button">反馈</button>
    </footer>

    <dialog id="modal">
      <div class="modal-hd">
        <span id="modalTitle">日志</span>
        <div class="modal-tabs" id="modalTabs" hidden>
          <button type="button" data-log="proxy" class="tab active">代理</button>
          <button type="button" data-log="sandbox" class="tab">沙箱</button>
        </div>
        <button class="modal-close" id="modalClose" type="button" aria-label="关闭">✕</button>
      </div>
      <pre id="modalBody"></pre>
    </dialog>
  </div>
  <script src="/assets/app.js" defer></script>
</body>
</html>
