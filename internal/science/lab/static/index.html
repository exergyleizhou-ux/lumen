<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumen Science · 实验室</title>
<link rel="stylesheet" href="assets/app.css?v=99">
</head><body>
<div class="splash" id="splash"><div class="spinner"></div>Lumen Science 实验室</div>
<div class="shell" id="shell">
  <header class="tb">
    <div class="tb-logo"><span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span></div>
    <span class="tb-spacer"></span>
    <span class="tb-stat"><span class="tb-dot"></span><span id="packBadge">—</span></span>
    <span class="tb-stat" id="fleetBadge">—</span>
    <a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>
  <div class="main">
    <nav class="side" id="sidebarPanel"><div class="side-inner">
      <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
      <div id="projectList"></div>
      <div style="margin-top:auto;padding-top:10px;border-top:1px solid var(--ocs-line);font-size:11px;line-height:1.6">
      <div style="color:var(--ocs-accent);font-weight:650;margin-bottom:6px">🔬 系统状态</div>
      <div id="sbFleet" style="color:var(--ocs-muted)">—</div>
      <div id="sbPack" style="color:var(--ocs-muted);margin-top:2px">—</div>
      <details style="margin-top:8px"><summary style="color:var(--ocs-accent);font-weight:650;font-size:11px;cursor:pointer">🖥 SSH 计算</summary>
        <div id="sbSSH" style="margin-top:4px"><span class="hint">加载中…</span></div>
        <div style="display:flex;gap:4px;margin-top:4px">
          <select id="sshHost" style="flex:1;height:24px;font-size:10px;border:1px solid var(--ocs-line);border-radius:4px;background:var(--ocs-surface-soft)"><option value="">选主机…</option></select>
        </div>
        
        
      </details>
    </div>
      <div class="side-ft"><span class="hint" id="modeHint">—</span></div>
    </div></nav>
    <div class="resize" id="resizeLeft"></div>
    <section class="ctr">
      <div class="ctr-tabs"><button class="ctr-tab active">对话</button></div>
      <div class="scroll" id="chatScroll">
        <div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>CS Research Pack · 23 域 · 247 工具 · 国产模型直连</p>
          <div class="chips"><button class="chip" data-prompt="用 pubmed 域检索 aspirin 药理文献">文献检索</button><button class="chip" data-prompt="生成 aspirin 四源 Research Brief">生成简报</button></div></div>
      </div>
      <form class="composer" id="composer"><input id="promptInput" placeholder="描述科研任务…" autocomplete="off"><button class="btn primary" type="submit">发送</button></form>
    </section>
    <div class="resize" id="resizeRight"></div>
    <aside class="insp" id="inspectorPanel">
      <div class="insp-tabs">
      <button class="insp-tab active" data-pane="status">状态</button>
      <button class="insp-tab" data-pane="files">文件</button>
      <button class="insp-tab" data-pane="skills">技能</button>
      <button class="insp-tab" data-pane="chem">化学</button>
      <button class="insp-tab" data-pane="mol">分子</button>
    </div>
      <div class="pane" id="statusPane"><div id="inspectorBody"></div></div>
      <div class="pane" id="filesPane" hidden><div id="fileTree"></div><div id="filePreview"></div></div>
      <div class="pane" id="skillsPane" hidden><div id="skillsBody"><span class="hint">加载中…</span></div></div>
      <div class="pane" id="chemPane" hidden>
        <p class="hint" style="padding:0 0 6px">Ketcher 分子编辑器</p>
        <iframe id="ketcherFrame" src="about:blank" style="width:100%;height:420px;border:1px solid var(--ocs-line);border-radius:8px"></iframe>
      </div>
      <div class="pane" id="molPane" hidden>
        <p class="hint" style="padding:0 0 6px">3Dmol 蛋白/分子预览</p>
        <div id="molViewer" style="width:100%;height:420px;border:1px solid var(--ocs-line);border-radius:8px"></div>
      </div>
    </aside>
  </div>
</div>
<script>
var $=function(id){return document.getElementById(id);};
var activeProject=null,activeThread="main";

async function api(path,opts){
  var r=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
  var t=await r.text();try{return JSON.parse(t);}catch(_){return{raw:t}};
}

async function refreshHealth(){
  var h=await api("/api/lab/health");
  $("packBadge").textContent=(h.research_pack||{}).healthy?(h.research_pack.domain_tools||0)+" tools":"Pack ✗";
  var f=h.fleet||{};
  $("fleetBadge").textContent=(f.connected_total||0)+"/"+(f.cs_domains||0)+" fleet";
  $("inspectorBody").innerHTML='<div class="sr"><span class="k">状态</span><span class="v g">● 在线</span></div><div class="sr-div"></div><div class="sr"><span class="k">Research</span><span class="v">'+(h.research_pack||{}).domain_tools+' tools</span></div><div class="sr"><span class="k">Fleet</span><span class="v">'+f.connected_total+'/'+f.cs_domains+' CS + '+f.lumen_native+' 原生</span></div><div class="sr-div"></div><div class="sr"><span class="k">模型</span><span class="v">'+((h.provider||{}).masked||"—")+'</span></div>';
  var sf=$("sbFleet");if(sf)sf.innerHTML=(f.connected_total||0)+"/"+(f.cs_domains||0)+" CS · "+(f.lumen_native||0)+" 原生";
  var sp=$("sbPack");if(sp)sp.innerHTML=((h.research_pack||{}).domain_tools||0)+" tools · "+((h.research_pack||{}).skills||0)+" skills";
  return h;
}

async function loadProjects(){
  var list=await api("/api/lab/projects");
  var nav=$("projectList");nav.innerHTML="";
  if(!list.length){nav.innerHTML='<span class="hint">点击 + 新建课题</span>';return;}
  list.forEach(function(p){
    var b=document.createElement("button");b.textContent=p.title;
    b.onclick=function(){activeProject=p;loadProjects();refreshFiles();};
    if(activeProject&&activeProject.slug===p.slug)b.classList.add("active");
    nav.appendChild(b);
  });
  if(!activeProject){activeProject=list[0];refreshFiles();}
}

async function ensureProject(){
  if(activeProject)return activeProject;
  activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:"默认课题"})});
  await loadProjects();return activeProject;
}

// Chat — clean streamChat
async function streamChat(prompt){
  var p=await ensureProject();
  var ue=document.createElement("div");ue.className="chat-msg user";ue.textContent=prompt;
  $("chatScroll").appendChild(ue);
  var w=$("welcome");if(w)w.style.display="none";
  var wrap=document.createElement("div");wrap.className="chat-msg agent-wrap";$("chatScroll").appendChild(wrap);
  var resp=document.createElement("div");resp.className="chat-msg agent";wrap.appendChild(resp);
  var think=null,tb=null,ta="",tc=0;
  try{
    var res=await fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug,prompt:prompt,mode:"plan",session_id:activeThread})});
    var reader=res.body.getReader();var dec=new TextDecoder();var buf="";
    while(true){var r=await reader.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);
      if(ev.kind==="text"){ta+=ev.text||"";resp.innerHTML=renderMD(ta);}
      else if(ev.kind==="thinking"){if(!think){think=document.createElement("details");think.className="think-block";think.open=true;think.innerHTML='<summary class="think-summary"><span class="think-dot"></span>🧠 思考中…</summary><div class="think-body"></div>';wrap.insertBefore(think,resp);tb=think.querySelector(".think-body");}tb.textContent+=ev.text||"";}
      else if(ev.kind==="tool_dispatch"){tc++;var tn=(ev.tool&&ev.tool.name)?ev.tool.name:("tool_"+tc);resp.innerHTML+='<span class="tool-tag">🔧 '+escHtml(tn)+'</span>';}
      else if(ev.kind==="tool_result"){resp.innerHTML+='<span class="tool-done">✓</span>';}
      else if(ev.kind==="error"){resp.innerHTML+='<span style="color:#b42318"> ❌ '+(ev.text||"err")+'</span>';}
      else if(ev.kind==="turn_done"&&think){think.open=false;}
    }}
  }catch(e){resp.textContent="错误: "+e.message;}
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;refreshFiles();
}

function renderMD(t){if(!t)return"";t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/### (.+)/g,"<h3>$1</h3>").replace(/## (.+)/g,"<h2>$1</h2>").replace(/\n\n/g,"</p><p>").replace(/^- (.+)$/gm,"<li>$1</li>").replace(/^(?!<)(.+)$/gm,"<p>$1</p>");return t;}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtSize(b){if(!b||b<1024)return(b||0)+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB";}

async function refreshFiles(){
  var el=$("fileTree");if(!el||!activeProject)return;
  try{var d=await api("/api/lab/files?project_id="+activeProject.slug);el.innerHTML=(d.files||[]).map(function(f){return'<div class="ft-row"><span>📄</span><span class="ft-name">'+f.name+'</span><span class="ft-size">'+(f.size?fmtSize(f.size):"")+'</span></div>';}).join("");}catch(e){el.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

async function previewFile(path){
  var fp=$("filePreview");if(!fp||!activeProject)return;
  try{var d=await api("/api/lab/files/content?project_id="+activeProject.slug+"&path="+encodeURIComponent(path));fp.innerHTML='<div class="fp-hd">📄 '+d.path+'</div><pre class="fp-body">'+escHtml(d.content||"")+'</pre>';}catch(e){fp.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

// Events
$("composer").addEventListener("submit",function(e){e.preventDefault();var p=$("promptInput").value.trim();if(!p)return;$("promptInput").value="";streamChat(p);});
$("newProjectBtn").addEventListener("click",async function(){var t=prompt("课题名称");if(!t)return;activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:t})});await loadProjects();});
document.querySelectorAll(".chip").forEach(function(b){b.addEventListener("click",function(){if(this.dataset.prompt)streamChat(this.dataset.prompt);});});
// Tabs
document.querySelectorAll(".insp-tab").forEach(function(t){t.addEventListener("click",function(){document.querySelectorAll(".insp-tab").forEach(function(b){b.classList.remove("active");});this.classList.add("active");var p=this.dataset.pane;["statusPane","filesPane","skillsPane","chemPane","molPane"].forEach(function(id){var el=$(id);if(el)el.hidden=id!==p+"Pane";});
      if(p==="files")refreshFiles();
      if(p==="skills")loadSkills();
      if(p==="chem")loadKetcher();
      if(p==="mol")loadMol();});});
// Resize
(function(){function mk(h,p,d){h.onmousedown=function(e){e.preventDefault();var sx=e.clientX,sw=p.getBoundingClientRect().width;h.classList.add("active");document.body.style.cursor="col-resize";document.body.style.userSelect="none";function mv(e){p.style.width=Math.max(160,Math.min(500,sw+(d?sx-e.clientX:e.clientX-sx)))+"px";}function up(){h.classList.remove("active");document.body.style.cursor="";document.body.style.userSelect="";document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);}document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);};}var rl=$("resizeLeft"),rr=$("resizeRight"),sp=$("sidebarPanel"),ip=$("inspectorPanel");if(rl&&sp)mk(rl,sp,false);if(rr&&ip)mk(rr,ip,true);})();
// Init

// Skills loader
async function loadSkills(){
  var el=$("skillsBody");if(!el)return;
  try{var d=await api("/api/lab/skills?project_id="+(activeProject?activeProject.slug:""));var s=d.skills||[];el.innerHTML=s.length?s.map(function(sk){return'<div class="ft-row"><span>📋</span><span class="ft-name">'+escHtml(sk.name||sk)+'</span></div>';}).join(""):'<span class="hint">暂无技能</span>';}catch(e){el.innerHTML='<span class="hint">加载失败</span>';}
}
// Ketcher lazy load
var ketcherLoaded=false;
function loadKetcher(){if(!ketcherLoaded){ketcherLoaded=true;$("ketcherFrame").src="https://lifescience.opensource.epam.com/ketcher/standalone/index.html";}}
// 3Dmol lazy load
var molLoaded=false;
function loadMol(){if(!molLoaded){molLoaded=true;var s=document.createElement("script");s.src="https://3Dmol.org/build/3Dmol-min.js";s.onload=function(){if(typeof $3Dmol!=="undefined"){var v=$3Dmol.createViewer("molViewer",{backgroundColor:"#fbf9f6"});fetch("https://files.rcsb.org/download/4HHB.pdb").then(function(r){return r.text();}).then(function(pdb){v.addModel(pdb,"pdb");v.setStyle({},{cartoon:{color:"#4c1d95"}});v.zoomTo();v.render();});}};document.head.appendChild(s);}}


// SSH hosts
async function loadSSH(){
  try{var d=await api("/api/lab/compute/ssh-hosts");var hosts=d.hosts||[];var el=$("sbSSH"),sel=$("sshHost");if(el)el.innerHTML=hosts.length?hosts.map(function(h){return'<div>'+h.alias+' ('+(h.hostname||"")+')</div>';}).join(""):'<span class="hint">无 SSH 配置</span>';if(sel)sel.innerHTML='<option value="">选主机…</option>'+hosts.map(function(h){return'<option value="'+h.alias+'">'+h.alias+'</option>';}).join("");}catch(e){var el=$("sbSSH");if(el)el.innerHTML='<span class="hint">不可用</span>';}
}

// SSH hosts loader
async function loadSSH(){
  var el=$("sbSSH");if(!el)return;
  try{var d=await api("/api/lab/compute/ssh-hosts");var h=d.hosts||[];el.innerHTML=h.length?h.map(function(x){return'<div>🖥 '+x.alias+'</div>';}).join(""):'无 SSH 配置';}catch(e){el.innerHTML='不可用';}
}
// Brief quick action
$("briefBtn").addEventListener("click",async function(){
  if(!activeProject){activeProject=await ensureProject();}
  var t=prompt("Brief 主题");if(!t)return;
  try{var r=await api("/api/lab/brief",{method:"POST",body:JSON.stringify({project_id:activeProject.slug,topic:t})});streamChat("请分析刚生成的 Brief: "+t);}catch(e){}
});
// C2D quick action
$("c2dBtn").addEventListener("click",function(){window.open("https://demo.oasisdata2026.xyz/c2d","_blank");});
// Load SSH on init
loadSSH();

setTimeout(function(){var s=$("splash");if(s)s.classList.add("hide");},1000);
(async function(){try{await refreshHealth();await loadProjects();}catch(e){$("inspectorBody").textContent=e.message;}})();
</script></body></html>
