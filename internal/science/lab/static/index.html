<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumen Science · 实验室</title>
<link rel="stylesheet" href="assets/app.css?v=99">
</head><body>
<div class="splash" id="splash"><div class="spinner"></div>Lumen Science 实验室</div>
<div class="shell" id="shell">
  <header class="tb">
    <div class="tb-logo"><span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span></div>
    <span class="tb-spacer"></span>

    <button class="tb-btn" id="themeToggle" title="切换暗色">🌙</button><a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>
  <div class="main">
    <nav class="side" id="sidebarPanel"><div class="side-inner">
      <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
      <div id="projectList"></div>
      <div class="side-ft">
        <details class="mem-section">
          <summary class="mem-summary">🧠 记忆管理</summary>
          <div id="memList" class="mem-list"></div>
          <div style="display:flex;gap:4px;margin-top:6px">
            <input id="memInput" placeholder="新记忆…" style="flex:1;height:28px;padding:0 8px;font-size:11px;border:1px solid var(--ocs-line);border-radius:6px;background:var(--ocs-surface-soft)">

    <div class="resize" id="resizeLeft"></div>
    <section class="ctr">

      <div class="scroll" id="chatScroll">
        <div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>CS Research Pack · 23 域 · 247 工具 · 国产模型直连</p>
          <div class="chips"><button class="chip" data-prompt="用 pubmed 域检索 aspirin 药理文献">文献检索</button><button class="chip" data-prompt="生成 aspirin 四源 Research Brief">生成简报</button></div></div>
      </div>
      <form class="composer" id="composer"><input id="promptInput" placeholder="描述科研任务…" autocomplete="off"><button class="btn primary" type="submit">发送</button></form>

      <div class="pane" id="statusPane"><div id="inspectorBody"></div></div>
      <div class="pane" id="filesPane" hidden>
        <div id="fileTree"></div>
        <div id="filePreview"></div>
        <details class="goal-section" style="margin-top:12px">
          <summary class="goal-summary">🎯 目标管理</summary>
          <div id="goalList"><span class="hint">暂无活跃目标</span></div>
          <div style="display:flex;gap:4px;margin-top:6px">
            <input id="goalInput" placeholder="新目标…" style="flex:1;height:28px;padding:0 8px;font-size:11px;border:1px solid var(--ocs-line);border-radius:6px;background:var(--ocs-surface-soft)">
            <button class="btn sm" id="goalAdd">添加</button>
          </div>
        </details>

          <summary class="goal-summary">🖥 SSH 远程计算</summary>

            <select id="sshHostSelect" style="flex:1;height:28px;font-size:11px;border:1px solid var(--ocs-line);border-radius:6px;background:var(--ocs-surface-soft)"><option value="">选择主机…</option></select>
            <input id="sshCmd" placeholder="命令…" style="flex:2;height:28px;padding:0 8px;font-size:11px;border:1px solid var(--ocs-line);border-radius:6px;background:var(--ocs-surface-soft)">
            <button class="btn sm" id="sshRun">执行</button>
          </div>
        </details>
      </div>
      <div class="pane" id="fleetPane" hidden><div id="fleetList"></div></div>
      <div class="pane" id="ketcherPane" hidden><p class="hint" style="padding:0 0 8px">Ketcher 分子编辑器</p><iframe id="ketcherFrame" src="about:blank" title="Ketcher"></iframe></div>
      <div class="pane" id="moleculePane" hidden><p class="hint" style="padding:0 0 8px">3Dmol 预览</p><div id="molViewer"></div></div>
      <div class="pane" id="settingsPane" hidden>
        <div class="set-card"><h3>外观</h3><div class="set-row"><span class="k">暗色模式</span><button class="btn sm" id="darkToggle">切换</button></div></div>
        <div class="set-card"><h3>Research Pack</h3><div id="researchInfo"></div></div>
        <div class="set-card"><h3>快捷</h3><button class="btn fill" id="c2dBtn">C2D 算法</button></div>
      </div>
    </aside>
  </div>
</div>
<script>
// === Minimal working Lab JS ===
var $=function(id){return document.getElementById(id);};
var activeProject=null,activeThread="main";

async function api(path,opts){
  var r=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
  var t=await r.text();try{return JSON.parse(t);}catch(_){return{raw:t}};
}

async function refreshHealth(){
  var h=await api("/api/lab/health");
  $("packBadge").textContent=(h.research_pack||{}).healthy?(h.research_pack.domain_tools||0)+" tools":"Pack ✗";
  var f=h.fleet||{};
  $("fleetBadge").textContent="⚡ "+(f.connected_total||0)+"/"+(f.cs_domains||0);
  $("modeHint").textContent=h.science_mode||"hybrid";
  $("inspectorBody").innerHTML='<div class="sr"><span class="k">状态</span><span class="v g">● 在线</span></div><div class="sr-div"></div><div class="sr"><span class="k">Research</span><span class="v">'+(h.research_pack||{}).domain_tools+' tools</span></div><div class="sr"><span class="k">Fleet</span><span class="v">'+f.connected_total+'/'+f.cs_domains+'</span></div><div class="sr-div"></div><div class="sr"><span class="k">模型</span><span class="v">'+((h.provider||{}).masked||"—")+'</span></div>';
  return h;
}

async function loadProjects(){
  var list=await api("/api/lab/projects");
  var nav=$("projectList");nav.innerHTML="";
  list.forEach(function(p){
    var b=document.createElement("button");b.textContent=p.title;
    b.onclick=function(){activeProject=p;loadProjects();refreshFiles();};
    if(activeProject&&activeProject.slug===p.slug)b.classList.add("active");
    nav.appendChild(b);
  });
  if(!activeProject&&list.length){activeProject=list[0];refreshFiles();}
}

async function ensureProject(){
  if(activeProject)return activeProject;
  activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:"默认课题"})});
  await loadProjects();return activeProject;
}

// === CHAT — the working version ===
async function streamChat(prompt){
  var p=await ensureProject();
  // User bubble
  var ue=document.createElement("div");ue.className="chat-msg user";ue.textContent=prompt;
  $("chatScroll").appendChild(ue);
  // Agent bubble
  var w=$("welcome");if(w)w.style.display="none";
  var ae=document.createElement("div");ae.className="chat-msg agent";
  $("chatScroll").appendChild(ae);
  var textAcc="";
  try{
    var res=await fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug,prompt:prompt,mode:"plan",session_id:activeThread})});
    var reader=res.body.getReader();var dec=new TextDecoder();var buf="";
    while(true){var r=await reader.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);if(ev.text&&(ev.kind==="text"||ev.kind==="thinking")){textAcc+=ev.text;ae.textContent=textAcc;}}}
  }catch(e){ae.textContent="错误: "+e.message;}
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;
  refreshFiles();
}
// Goal management
window._goals=[];
$("goalAdd").onclick=function(){
  var v=$("goalInput").value.trim();if(!v)return;
  window._goals.push({text:v,done:false});
  $("goalInput").value="";renderGoals();
};
function renderGoals(){
  var el=$("goalList");if(!el)return;
  el.innerHTML=window._goals.map(function(g,i){return '<div class="goal-item"><input type="checkbox" '+(g.done?"checked":"")+' onchange="window._goals['+i+'].done=this.checked;renderGoals();"><span style="'+(g.done?'text-decoration:line-through;opacity:.5':'')+'">'+g.text+'</span></div>';}).join("")||'<span class="hint">暂无活跃目标</span>';
}

// Files
async function refreshFiles(){
  var el=$("fileTree");if(!el||!activeProject)return;
  try{
    var data=await api("/api/lab/files?project_id="+activeProject.slug);
    el.innerHTML=(data.files||[]).map(function(f){return '<div class="ft-row" onclick="previewFile(\''+f.name+'\')"><span>📄</span><span class="ft-name">'+f.name+'</span><span class="ft-size">'+(f.size?fmtSize(f.size):"")+'</span></div>';}).join("");
  }catch(e){el.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

async function isPDF(n){return n.toLowerCase().endsWith(".pdf");}
function isImage(n){var e=n.toLowerCase();return e.endsWith(".png")||e.endsWith(".jpg")||e.endsWith(".jpeg")||e.endsWith(".gif")||e.endsWith(".svg");}
function previewFile(path){
  var fp=$("filePreview");if(!fp||!activeProject)return;
  if(isPDF(path)){
    fp.innerHTML='<div class="fp-hd">📕 '+path+'</div><iframe src="http://127.0.0.1:18992/api/lab/files/download?project_id='+activeProject.slug+'&path='+encodeURIComponent(path)+'" style="width:100%;height:400px;border:1px solid var(--ocs-line);border-radius:8px"></iframe>';
    return;
  }
  function isOffice(n){var e=n.toLowerCase();return e.endsWith(".docx")||e.endsWith(".pptx")||e.endsWith(".xlsx")||e.endsWith(".doc")||e.endsWith(".ppt")||e.endsWith(".xls");}
  if(isOffice(path)){
    var url="http://127.0.0.1:18992/api/lab/files/download?project_id="+activeProject.slug+"&path="+encodeURIComponent(path);
    fp.innerHTML='<div class="fp-hd">📎 '+path+'</div><iframe src="https://docs.google.com/viewer?url='+encodeURIComponent(url)+'&embedded=true" style="width:100%;height:400px;border:1px solid var(--ocs-line);border-radius:8px"></iframe><p class="hint" style="margin-top:4px"><a href="'+url+'" target="_blank">下载原文件</a></p>';
    return;
  }
  if(isImage(path)){
    fp.innerHTML='<div class="fp-hd">🖼 '+path+'</div><img src="http://127.0.0.1:18992/api/lab/files/download?project_id='+activeProject.slug+'&path='+encodeURIComponent(path)+'" style="max-width:100%;max-height:400px;border-radius:8px">';
    return;
  }
  var fp=$("filePreview");if(!fp||!activeProject)return;
  try{
    var data=await api("/api/lab/files/content?project_id="+activeProject.slug+"&path="+encodeURIComponent(path));
    fp.innerHTML='<div class="fp-hd">📄 '+data.path+' ('+fmtSize(data.size)+')</div><pre class="fp-body">'+escHtml(data.content)+'</pre>';
  }catch(e){fp.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

function fmtSize(b){if(!b||b<1024)return (b||0)+"B";if(b<1048576)return (b/1024).toFixed(1)+"KB";return (b/1048576).toFixed(1)+"MB";}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// Events
$("composer").addEventListener("submit",function(e){e.preventDefault();var p=$("promptInput").value.trim();if(!p)return;$("promptInput").value="";streamChat(p);});
$("newProjectBtn").addEventListener("click",async function(){var t=prompt("课题名称");if(!t)return;activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:t})});await loadProjects();});
document.querySelectorAll(".chip").forEach(function(b){b.addEventListener("click",function(){if(this.dataset.prompt)streamChat(this.dataset.prompt);});});
// Tabs
document.querySelectorAll(".insp-tab").forEach(function(t){t.addEventListener("click",function(){document.querySelectorAll(".insp-tab").forEach(function(b){b.classList.remove("active");});this.classList.add("active");var p=this.dataset.pane;$("statusPane").hidden=p!=="status";$("filesPane").hidden=p!=="files";if(p==="files")refreshFiles();});});
// Resize
(function(){function r(h,p,d){var sx,sw;h.addEventListener("mousedown",function(e){sx=e.clientX;sw=p.getBoundingClientRect().width;document.body.style.cursor="col-resize";function m(e){p.style.width=Math.max(160,Math.min(480,sw+(d?sw-(e.clientX-sx):(e.clientX-sx))))+"px";}function u(){document.body.style.cursor="";document.removeEventListener("mousemove",m);document.removeEventListener("mouseup",u);}document.addEventListener("mousemove",m);document.addEventListener("mouseup",u);});}var rl=$("resizeLeft"),rr=$("resizeRight"),sp=$("sidebarPanel"),ip=$("inspectorPanel");if(rl&&sp)r(rl,sp,false);if(rr&&ip)r(rr,ip,true);})();


// Dark mode
var dm=localStorage.getItem("lumen-lab-theme");
if(dm==="dark"||(!dm&&window.matchMedia("(prefers-color-scheme:dark)").matches))document.documentElement.classList.add("dark");
$("themeToggle").onclick=function(){document.documentElement.classList.toggle("dark");localStorage.setItem("lumen-lab-theme",document.documentElement.classList.contains("dark")?"dark":"light");this.textContent=document.documentElement.classList.contains("dark")?"☀":"🌙";};
$("darkToggle").onclick=function(){document.documentElement.classList.toggle("dark");localStorage.setItem("lumen-lab-theme",document.documentElement.classList.contains("dark")?"dark":"light");};

// Fleet browser
async function refreshFleet(){
  var el=$("fleetList");if(!el)return;
  try{
    var h=await api("/api/lab/health");
    var f=h.fleet||{},p=h.research_pack||{};
    el.innerHTML='<div class="set-card"><h3>🚀 舰队</h3><div class="set-row"><span class="k">CS domains</span><span class="v g">'+(f.cs_connected||0)+'/'+(f.cs_domains||0)+'</span></div><div class="set-row"><span class="k">原生 fleet</span><span class="v g">'+(f.lumen_native||0)+'</span></div><div class="set-row"><span class="k">Skills</span><span class="v">'+(p.skills||0)+'</span></div><div class="set-row"><span class="k">Tools</span><span class="v">'+(p.domain_tools||0)+'</span></div></div><div class="set-card"><h3>📡 原生 MCP</h3>'+["pubmed","chembl","geo","oasis","c2d","openalex","arxiv","semantic_scholar"].map(function(x){return '<div class="flt-domain"><span class="flt-dot"></span><span class="flt-name">'+x+'</span></div>';}).join("")+'</div>';
  }catch(e){}
}
$("c2dBtn").onclick=function(){window.open("https://demo.oasisdata2026.xyz/c2d","_blank");};

// Ketcher lazy load
var ketcherLoaded=false;
document.querySelector('[data-pane="ketcher"]').onclick=function(){
  if(!ketcherLoaded){ketcherLoaded=true;$("ketcherFrame").src="https://lifescience.opensource.epam.com/ketcher/standalone/index.html";}
};

// 3Dmol lazy load
var molLoaded=false;
document.querySelector('[data-pane="molecule"]').onclick=function(){
  if(!molLoaded){molLoaded=true;var s=document.createElement("script");s.src="https://3Dmol.org/build/3Dmol-min.js";s.onload=function(){if(typeof $3Dmol!=="undefined"){var v=$3Dmol.createViewer("molViewer",{backgroundColor:"#fbf9f6"});fetch("https://files.rcsb.org/download/4HHB.pdb").then(function(r){return r.text();}).then(function(pdb){v.addModel(pdb,"pdb");v.setStyle({},{cartoon:{color:"#4c1d95"}});v.zoomTo();v.render();});}};document.head.appendChild(s);}
};

// Tab handlers for fleet/settings/ketcher/molecule
document.querySelectorAll(".insp-tab").forEach(function(t){t.addEventListener("click",function(){var p=this.dataset.pane;["statusPane","filesPane","fleetPane","ketcherPane","moleculePane","settingsPane"].forEach(function(id){var el=document.getElementById(id);if(el)el.hidden=id!==p+"Pane";});if(p==="fleet")refreshFleet();if(p==="settings"){refreshFleet();var h=refreshHealth();}});});


// Simple markdown renderer
function renderMD(t){
  return (t||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/```(\w*)\n([\s\S]*?)```/g,"<pre><code>$2</code></pre>")
    .replace(/`([^`]+)`/g,"<code>$1</code>")
    .replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/

/g,"</p><p>").replace(/^(.+)$/gm,"<p>$1</p>");
}

// Apply markdown to agent bubble after streaming
var orig_streamChat = streamChat;
streamChat = async function(prompt, mode){
  var p = await ensureProject();
  var ue = document.createElement("div"); ue.className = "chat-msg user"; ue.textContent = prompt;
  $("chatScroll").appendChild(ue);
  var w = $("welcome"); if(w) w.style.display = "none";
  var ae = document.createElement("div"); ae.className = "chat-msg agent";
  $("chatScroll").appendChild(ae);
  var textAcc = "";
  try {
    var res = await fetch("/api/lab/chat", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug,prompt:prompt,mode:mode||"plan",session_id:activeThread})});
    var reader = res.body.getReader(); var dec = new TextDecoder(); var buf = "";
    while(true){var r=await reader.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);if(ev.text&&(ev.kind==="text"||ev.kind==="thinking")){textAcc+=ev.text;ae.innerHTML=renderMD(textAcc);}if(ev.kind==="usage"&&ev.total_tokens){var st=$("statTokens");if(st)st.textContent=ev.total_tokens+" tokens";if(ev.cache_hit_pct!==undefined){var sc=$("statCache");if(sc)sc.textContent="缓存 "+(ev.cache_hit_pct||0)+"%";}}}}
  }catch(e){ae.textContent="错误: "+e.message;}
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;
  refreshFiles();
}
// Goal management
window._goals=[];
$("goalAdd").onclick=function(){
  var v=$("goalInput").value.trim();if(!v)return;
  window._goals.push({text:v,done:false});
  $("goalInput").value="";renderGoals();
};
function renderGoals(){
  var el=$("goalList");if(!el)return;
  el.innerHTML=window._goals.map(function(g,i){return '<div class="goal-item"><input type="checkbox" '+(g.done?"checked":"")+' onchange="window._goals['+i+'].done=this.checked;renderGoals();"><span style="'+(g.done?'text-decoration:line-through;opacity:.5':'')+'">'+g.text+'</span></div>';}).join("")||'<span class="hint">暂无活跃目标</span>';
};

// Add status bar
var stbar=document.createElement("div");stbar.id="statusbar";stbar.className="statusbar";
stbar.innerHTML='<span id="statTokens">— tokens</span><span id="statCache">—</span><span id="statModel">deepseek-chat</span>';
document.querySelector(".ctr").appendChild(stbar);


// Knowledge Base — persistent memories via Lumen API
async function loadKB(){
  var el=$("memList");if(!el)return;
  try{
    var h=await api("/api/lab/health");
    var p=h.research_pack||{};
    el.innerHTML='<div class="mem-item"><span class="hint">📚 '+p.skills+' Skills · '+p.domain_tools+' Tools</span></div>';
    // Load project memories
    if(activeProject){
      var prov=await api("/api/lab/provenance?project_id="+activeProject.slug).catch(function(){return{records:[]};});
      el.innerHTML+='<div class="mem-item"><span class="hint">📋 '+prov.count+' provenance records</span></div>';
    }
  }catch(e){el.innerHTML='<span class="hint">KB 加载中…</span>';}
}
$("memSave").onclick=async function(){
  var v=$("memInput").value.trim();if(!v)return;
  $("memInput").value="";
  try{
    // Store as a file in workspace
    if(activeProject){
      await api("/api/lab/chat",{method:"POST",body:JSON.stringify({project_id:activeProject.slug,prompt:"Remember this as a project fact: "+v,mode:"plan",session_id:activeThread})});
    }
    loadKB();
  }catch(e){}
};
// Load on project select
var orig_loadProjects=loadProjects;
loadProjects=async function(){
  await orig_loadProjects();
  loadKB();
};
async function loadMemories(){
  var el=$("memList");if(!el)return;
  try{var d=await api("/api/lab/skills?project_id="+(activeProject?activeProject.slug:""));el.innerHTML="";}catch(e){el.innerHTML='<span class="hint">记忆加载中…</span>';}
}
$("memSave").onclick=async function(){
  var v=$("memInput").value.trim();if(!v)return;
  $("memInput").value="";
  loadMemories();
};

// Session persistence — save last chat state
function saveChatState(){
  var msgs=[];
  document.querySelectorAll("#chatScroll .chat-msg").forEach(function(el){
    msgs.push({cls:el.classList.contains("user")?"user":"agent",text:el.textContent.slice(0,500)});
  });
  try{localStorage.setItem("lumen-lab-chat",JSON.stringify(msgs.slice(-20)));}catch(_){}
}
function restoreChatState(){
  try{
    var msgs=JSON.parse(localStorage.getItem("lumen-lab-chat")||"[]");
    msgs.forEach(function(m){var el=document.createElement("div");el.className="chat-msg "+m.cls;el.textContent=m.text;$("chatScroll").appendChild(el);});
  }catch(_){}
}

// Auto-save chat on new messages
var orig_append = Element.prototype.appendChild;
var chatScroll = document.getElementById("chatScroll");
if(chatScroll){
  var observer = new MutationObserver(function(){saveChatState();});
  observer.observe(chatScroll,{childList:true,subtree:true,characterData:true});
}

// Stream recovery — if fetch fails, show retry button
var orig_fetch = window.fetch;
window.fetch = function(url, opts){
  return orig_fetch(url, opts).catch(function(e){
    if(url.indexOf("/api/lab/chat")>=0){
      var ae=document.querySelector("#chatScroll .chat-msg.agent:last-child");
      if(ae)ae.innerHTML+='<br><button class="btn sm" onclick="streamChat(\''+(opts.body?JSON.parse(opts.body).prompt:"")+'\')">🔄 重试</button>';
    }
    throw e;
  });
};


// SSH runtime sync
async function loadSSHHosts(){
  var el=$("sshHosts"),sel=$("sshHostSelect");if(!el||!sel)return;
  try{
    var d=await api("/api/lab/compute/ssh-hosts");
    var hosts=d.hosts||[];
    el.innerHTML=hosts.map(function(h){return '<div class="flt-domain"><span class="flt-dot"></span><span class="flt-name">'+h.alias+' ('+(h.hostname||"")+')</span></div>';}).join("")||'<span class="hint">无 SSH 主机</span>';
    sel.innerHTML='<option value="">选择主机…</option>'+hosts.map(function(h){return '<option value="'+h.alias+'">'+h.alias+'</option>';}).join("");
  }catch(e){el.innerHTML='<span class="hint">SSH 配置不可用</span>';}
}
$("sshRun").onclick=async function(){
  var host=$("sshHostSelect").value,cmd=$("sshCmd").value.trim();
  if(!host||!cmd||!activeProject)return;
  $("sshCmd").value="";
  try{
    var j=await api("/api/lab/compute/jobs?project_id="+activeProject.slug,{method:"POST",body:JSON.stringify({host:host,command:cmd})});
    appendMsg("agent","🖥 SSH 任务已提交: "+j.id);
  }catch(e){appendMsg("agent","❌ "+e.message);}
};
loadSSHHosts();

(async function(){setTimeout(function(){var s=$("splash");if(s)s.classList.add("hide");},1200);try{await refreshHealth();await loadProjects();}catch(e){$("inspectorBody").textContent=e.message;}})();
</script></body></html>
