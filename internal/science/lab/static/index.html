<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><title>Lumen Science · 实验室</title>
<link rel="stylesheet" href="assets/app.css?v=1">
<style>
html.dark{filter:invert(0.9) hue-rotate(180deg)}
html.dark img,html.dark canvas,html.dark iframe,html.dark video{filter:invert(1) hue-rotate(180deg)}
</style>
</head><body>
<div class="shell" id="shell">
  <header class="tb">
    <span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span>
    <span class="tb-spacer"></span>
    <span class="tb-stat"><span class="tb-dot"></span><span id="packBadge">—</span></span>
    <span class="tb-stat" id="fleetBadge">—</span>
    <button class="tb-btn" id="dmToggle" title="暗色模式" style="width:28px;height:28px;border:none;background:none;cursor:pointer;font-size:14px">🌙</button><a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>
  <div class="main">
    <nav class="side" id="sidebarPanel"><div class="side-inner">
      <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
      <div style="display:flex;gap:4px;margin-bottom:6px"><input type="file" id="labFileInput2" multiple style="display:none" onchange="uploadLabFiles(this.files)"><button class="btn sm" title="上传文件到当前课题" onclick="document.getElementById('labFileInput2').click()" style="font-size:10px" title="上传文件到当前课题">📤</button><button class="btn sm" id="briefBtn2" style="flex:1;font-size:10px">📋 Brief</button><button class="btn sm" id="c2dBtn2" style="flex:1;font-size:10px">🏷 C2D</button></div>
      <div id="projectList"></div>
      <div style="margin-top:8px;border-top:1px solid var(--ocs-line);padding-top:8px">
        <div style="font-size:11px;font-weight:650;color:var(--ocs-accent);cursor:pointer;margin-bottom:4px" onclick="var t=this.nextElementSibling;t.hidden=!t.hidden;this.querySelector('span').textContent=t.hidden?'▸':'▾'">📁 工作区文件 <span>▾</span></div>
        <div id="wsTree" style="max-height:200px;overflow:auto;font-size:10px"></div>
      </div>
      <div style="margin-top:auto;padding-top:10px;border-top:1px solid var(--ocs-line);font-size:11px;line-height:1.6">
        <div style="color:var(--ocs-accent);font-weight:650;margin-bottom:4px">🔬 连接状态 <span id="statusDot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#5b8c7a;margin-left:4px;box-shadow:0 0 0 3px rgba(91,140,122,.2)"></span></div>
        <div id="sbFleet" style="color:var(--ocs-muted);cursor:pointer" onclick="document.querySelector('.insp-tab[data-pane=status]').click()" title="点击查看详情">—</div>
        <div id="sbPack" style="color:var(--ocs-muted);cursor:pointer;margin-top:2px" onclick="document.querySelector('.insp-tab[data-pane=status]').click()" title="点击查看详情">—</div>
      </div>
    </div></nav>
    <div class="resize" id="resizeLeft"></div>
    <section class="ctr">
      <div class="scroll" id="chatScroll" style="overflow-y:scroll !important">
        <div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>CS Research Pack · 23 域 · 247 工具 · 国产模型直连</p></div>
      </div>
      <div id="changeBar" style="display:none;padding:4px 16px;font-size:10px;color:var(--ocs-muted);border-top:1px solid var(--ocs-line);background:var(--ocs-surface-soft)">📝 <span id="changeList"></span></div>
      <form class="composer" id="composer"><input id="promptInput" placeholder="描述科研任务…" autocomplete="off"><button class="btn primary" type="submit">发送</button></form>
    </section>
    <div class="resize" id="resizeRight"></div>
    <aside class="insp" id="inspectorPanel">
      <div class="insp-tabs">
        <button class="insp-tab active" data-pane="status">状态</button>
        <button class="insp-tab" data-pane="files">文件</button>
        <button class="insp-tab" data-pane="skills">技能</button>
        <button class="insp-tab" data-pane="chem">化学</button>
        <button class="insp-tab" data-pane="mol">分子</button>
        <button class="insp-tab" data-pane="log">日志</button>
      </div>
      <div class="pane" id="statusPane"><div id="inspectorBody">加载中…</div></div>
      <div class="pane" id="filesPane" hidden><input type="file" id="labFileInput" multiple style="display:none" onchange="uploadLabFiles(this.files)"><div style="display:flex;gap:4px;margin-bottom:6px"><button class="btn sm" title="上传文件到当前课题" onclick="document.getElementById('labFileInput').click()">📤 上传</button><button class="btn sm" id="labDeleteBtn">🗑 删除</button></div><div id="fileTree"></div><div id="filePreview"></div></div>
      <div class="pane" id="skillsPane" hidden><div id="skillsBody"></div></div>
      <div class="pane" id="chemPane" hidden><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="hint">Ketcher 分子编辑器</span><button class="btn sm" onclick="document.querySelector('.insp-tab[data-pane=status]').click()" style="font-size:16px;line-height:1">✕</button></div><iframe id="ketcherFrame" src="about:blank" style="width:100%;height:420px;border:1px solid var(--ocs-line);border-radius:8px"></iframe></div>
      <div class="pane" id="logPane" hidden><div id="logBody" class="mono" style="font-size:10px;white-space:pre-wrap;max-height:400px;overflow:auto"></div></div>
      <div class="pane" id="molPane" hidden><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><span class="hint">3Dmol 蛋白预览</span><button class="btn sm" onclick="document.querySelector('.insp-tab[data-pane=status]').click()" style="font-size:16px;line-height:1">✕</button></div><div id="molViewer" style="width:100%;height:420px;border:1px solid var(--ocs-line);border-radius:8px"></div></div>
    </aside>
  </div>
</div>
<script>
var $=function(id){return document.getElementById(id);};
var activeProject=null;

async function api(path,opts){
  var r=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
  var t=await r.text();try{return JSON.parse(t);}catch(_){return{raw:t}};
}

async function refreshHealth(){
  var h=await api("/api/lab/health");
  var f=h.fleet||{},p=h.research_pack||{};
  $("packBadge").textContent=p.healthy?p.domain_tools+" tools":"Pack ✗";
  $("fleetBadge").textContent=(f.connected_total||0)+"/"+(f.cs_domains||0)+" fleet";
  $("inspectorBody").innerHTML='<div class="sr"><span class="k">状态</span><span class="v g">● 在线</span></div><div class="sr-div"></div><div class="sr"><span class="k">Fleet</span><span class="v">'+f.connected_total+'/'+f.cs_domains+' CS + '+f.lumen_native+' 原生</span></div><div class="sr-div"></div><div class="sr"><span class="k">Tools</span><span class="v">'+p.domain_tools+'</span></div>';
  var sd=$("statusDot");if(sd)sd.style.background=(f.connected_total||0)>=20?"#5b8c7a":"#c28b4b";
  var sf=$("sbFleet");if(sf)sf.innerHTML=(f.connected_total||0)+"/"+(f.cs_domains||0)+" CS · "+(f.lumen_native||0)+" 原生";
  var sp=$("sbPack");if(sp)sp.innerHTML=(p.domain_tools||0)+" tools · "+(p.skills||0)+" skills";
}

async function loadProjects(){
  var list=await api("/api/lab/projects");
  var nav=$("projectList");nav.innerHTML="";
  if(!list||!list.length){nav.innerHTML='<a href="#" onclick="document.getElementById(\'newProjectBtn\').click();return false" class="btn fill" style="font-size:11px;text-align:left;text-decoration:none">📋 暂无课题，点击创建</a>';return;}
  list.forEach(function(p){
    var row=document.createElement("div");row.style.cssText="display:flex;align-items:center;gap:2px";
    var b=document.createElement("button");b.textContent=p.title;b.style.cssText="flex:1;text-align:left;height:34px;padding:0 10px;font-size:12px;border:none;border-radius:8px;background:transparent;cursor:pointer;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:inherit;color:inherit";
    b.onclick=function(){activeProject=p;loadProjects();refreshFiles();};
    if(activeProject&&activeProject.slug===p.slug)b.classList.add("active");
    var d=document.createElement("button");d.innerHTML="✕";d.title="删除课题";d.style.cssText="width:24px;height:24px;border:none;border-radius:6px;background:transparent;color:var(--ocs-muted);cursor:pointer;font-size:14px;flex-shrink:0;opacity:0;transition:opacity .15s";
    d.onclick=async function(e){e.stopPropagation();if(!confirm('删除课题: '+p.title+'?'))return;await api('/api/lab/projects/'+p.slug,{method:'DELETE'});if(activeProject&&activeProject.slug===p.slug)activeProject=null;loadProjects();};
    row.onmouseenter=function(){d.style.opacity="1";};row.onmouseleave=function(){d.style.opacity="0";};
    row.appendChild(b);row.appendChild(d);nav.appendChild(row);
  });
  if(!activeProject&&list.length){activeProject=list[0];refreshFiles();}
}

async function ensureProject(){
  if(activeProject)return activeProject;
  activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:"默认课题"})});
  await loadProjects();return activeProject;
}

async function streamChat(prompt){
  var p=await ensureProject();
  var ue=document.createElement("div");ue.className="chat-msg user";ue.textContent=prompt;$("chatScroll").appendChild(ue);
  var w=$("welcome");if(w)w.style.display="none";
  var wrap=document.createElement("div");wrap.className="chat-msg agent-wrap";$("chatScroll").appendChild(wrap);
  var resp=document.createElement("div");resp.className="chat-msg agent";wrap.appendChild(resp);
  var ta="",tc=0;
  try{
    var res=await fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug,prompt:prompt,mode:"plan"})});
    var rdr=res.body.getReader();var dec=new TextDecoder();var buf="";
    while(true){var r=await rdr.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);
      if(ev.kind==="text"){ta+=ev.text||"";resp.innerHTML=renderMD(ta);}
      else if(ev.kind==="tool_dispatch"){tc++;var tn=(ev.tool&&ev.tool.name)?ev.tool.name:("tool_"+tc);resp.innerHTML+='<span class="tool-tag" title="'+escHtml(tn)+'">🔧 '+escHtml(tn)+'</span>';}
      else if(ev.kind==="tool_result"){resp.innerHTML+='<span class="tool-done">✓</span>';}
      else if(ev.kind==="error"){resp.innerHTML+='<span style="color:#b42318"> ❌ '+(ev.text||"err")+'</span>';}
    }}
  }catch(e){resp.textContent="错误: "+e.message;}
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;refreshFiles();
}

function renderMD(t){if(!t)return"";t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");t=t.replace(/\|(.+)\|\n\|[-: |]+\|\n((?:\|.+\|\n?)+)/gm,function(m,h,r){var hdr="<tr>"+h.split("|").map(function(c){return"<th>"+c.trim()+"</th>";}).join("")+"</tr>";var rows=r.trim().split("\n").map(function(rw){return"<tr>"+rw.split("|").filter(function(c){return c;}).map(function(c){return"<td>"+c.trim()+"</td>";}).join("")+"</tr>";}).join("");return"<table>"+hdr+rows+"</table>";});t=t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/### (.+)/g,"<h3>$1</h3>").replace(/## (.+)/g,"<h2>$1</h2>").replace(/\n\n/g,"</p><p>").replace(/^- (.+)$/gm,"<li>$1</li>").replace(/^(?!<)(.+)$/gm,"<p>$1</p>");return t;}if(!t)return"";t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>").replace(/### (.+)/g,"<h3>$1</h3>").replace(/## (.+)/g,"<h2>$1</h2>").replace(/\n\n/g,"</p><p>").replace(/^- (.+)$/gm,"<li>$1</li>").replace(/^(?!<)(.+)$/gm,"<p>$1</p>");return t;}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function fmtSize(b){if(!b||b<1024)return(b||0)+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB";}

async function refreshFiles(){
  var el=$("fileTree");if(!el||!activeProject)return;
  try{var d=await api("/api/lab/files?project_id="+activeProject.slug);el.innerHTML=(d.files||[]).map(function(f){return'<div class="ft-row" onclick="previewFile(\''+f.name+'\')" style="cursor:pointer"><span>📄</span><span class="ft-name">'+f.name+'</span><span class="ft-size">'+(f.size?fmtSize(f.size):"")+'</span></div>';}).join("");}catch(e){el.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}
async function previewFile(path){
  var fp=$("filePreview");if(!fp||!activeProject)return;
  try{var d=await api("/api/lab/files/content?project_id="+activeProject.slug+"&path="+encodeURIComponent(path));fp.innerHTML='<div class="fp-hd">📄 '+d.path+'</div><pre class="fp-body">'+escHtml(d.content||"")+'</pre>';}catch(e){fp.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}
async function loadSkills(){
  var el=$("skillsBody");if(!el)return;
  try{var d=await api("/api/lab/skills?project_id="+(activeProject?activeProject.slug:""));var s=d.skills||[];el.innerHTML=s.length?s.map(function(sk){return'<div class="ft-row"><span>📋</span><span class="ft-name">'+escHtml(sk.name||sk)+'</span></div>';}).join(""):'<span class="hint">暂无技能</span>';}catch(e){el.innerHTML='<span class="hint">加载失败</span>';}
}
var ketcherLoaded=false;
function loadKetcher(){if(!ketcherLoaded){ketcherLoaded=true;$("ketcherFrame").src="https://lifescience.opensource.epam.com/ketcher/standalone/index.html";}}
var molLoaded=false;
function loadMol(){if(!molLoaded){molLoaded=true;var s=document.createElement("script");s.src="https://3Dmol.org/build/3Dmol-min.js";s.onload=function(){if(typeof $3Dmol!=="undefined"){var v=$3Dmol.createViewer("molViewer",{backgroundColor:"#fbf9f6"});fetch("https://files.rcsb.org/download/4HHB.pdb").then(function(r){return r.text();}).then(function(pdb){v.addModel(pdb,"pdb");v.setStyle({},{cartoon:{color:"#4c1d95"}});v.zoomTo();v.render();});}};document.head.appendChild(s);}}

// Events
$("composer").addEventListener("submit",function(e){e.preventDefault();var p=$("promptInput").value.trim();if(!p)return;$("promptInput").value="";streamChat(p);});
$("newProjectBtn").addEventListener("click",async function(){var t=prompt("课题名称");if(!t)return;activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:t})});await loadProjects();});
document.querySelectorAll(".insp-tab").forEach(function(t){t.addEventListener("click",function(){document.querySelectorAll(".insp-tab").forEach(function(b){b.classList.remove("active");});this.classList.add("active");var p=this.dataset.pane;["statusPane","filesPane","skillsPane","chemPane","molPane","logPane"].forEach(function(id){var el=$(id);if(el)el.hidden=id!==p+"Pane";});if(p==="files")refreshFiles();if(p==="skills")loadSkills();if(p==="chem")loadKetcher();if(p==="mol")loadMol();if(p==="log")loadLogs();});});

// Resize
(function(){function mk(h,p,d){h.onmousedown=function(e){e.preventDefault();var sx=e.clientX,sw=p.getBoundingClientRect().width;h.classList.add("active");document.body.style.cursor="col-resize";document.body.style.userSelect="none";function mv(e){p.style.width=Math.max(160,Math.min(500,sw+(d?sx-e.clientX:e.clientX-sx)))+"px";}function up(){h.classList.remove("active");document.body.style.cursor="";document.body.style.userSelect="";document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);}document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);};}var rl=$("resizeLeft"),rr=$("resizeRight"),sp=$("sidebarPanel"),ip=$("inspectorPanel");if(rl&&sp)mk(rl,sp,false);if(rr&&ip)mk(rr,ip,true);})();

// Init
async function loadLogs(){
  var el=$("logBody");if(!el)return;
  try{var r=await api("/api/lab/health");var f=r.fleet||{},p=r.research_pack||{};
    el.innerHTML='<div class="set-card"><h3>📡 连接</h3><div class="set-row"><span class="k">状态</span><span class="v g">● 在线</span></div><div class="set-row"><span class="k">版本</span><span class="v">'+(r.version||"dev")+'</span></div></div><div class="set-card"><h3>🚀 舰队</h3><div class="set-row"><span class="k">CS domains</span><span class="v">'+(f.cs_connected||0)+'/'+(f.cs_domains||0)+'</span></div><div class="set-row"><span class="k">原生 MCP</span><span class="v">'+(f.lumen_native||0)+'</span></div></div><div class="set-card"><h3>📦 Research</h3><div class="set-row"><span class="k">Tools</span><span class="v">'+(p.domain_tools||0)+'</span></div><div class="set-row"><span class="k">Skills</span><span class="v">'+(p.skills||0)+'</span></div></div>';
  }catch(e){el.textContent=e.message;}
}
var labSelectedFile=null;
async function uploadLabFiles(files){
  for(var i=0;i<files.length;i++){
    var f=files[i];
    try{
      var fd=new FormData();fd.append("file",f);
      await fetch("/api/lab/files/upload?project_id="+(activeProject?activeProject.slug:"")+"&path="+encodeURIComponent(f.name),{method:"POST",body:fd});
    }catch(e){}
  }
  refreshFiles();
}
$("labDeleteBtn").onclick=async function(){
  if(!labSelectedFile||!activeProject){alert("请先选择文件");return;}
  if(!confirm("删除 "+labSelectedFile+"？"))return;
  try{await fetch("/api/lab/files/delete?project_id="+activeProject.slug+"&path="+encodeURIComponent(labSelectedFile),{method:"DELETE"});refreshFiles();}catch(e){alert(e.message);}
};
// Override previewFile to track selection
var _pf=previewFile;
previewFile=function(path){labSelectedFile=path;_pf(path);};

(async function(){await refreshHealth();await loadProjects();})();

setInterval(function(){
  var msgs=[];document.querySelectorAll("#chatScroll .chat-msg").forEach(function(e){msgs.push({c:e.className,t:e.textContent.slice(0,500)});});
  try{localStorage.setItem("lab-msgs",JSON.stringify(msgs.slice(-30)));}catch(_){}
},3000);
setTimeout(function(){
  try{var msgs=JSON.parse(localStorage.getItem("lab-msgs")||"[]");msgs.forEach(function(m){var e=document.createElement("div");e.className=m.c;e.textContent=m.t;$("chatScroll").appendChild(e);});}catch(_){}
},300);


// Multi-tab conversations
var conversations = {main: {id:"main",title:"对话",messages:[],sessionId:"main"}};
var activeConv = "main";

function switchConv(cid){
  activeConv = cid;
  document.querySelectorAll(".ctr-tab").forEach(function(t){t.classList.toggle("active",t.dataset.cid===cid);});
  var chat = $("chatScroll");
  chat.innerHTML = "";
  var msgs = conversations[cid]?.messages || [];
  msgs.forEach(function(m){chat.appendChild(m.el);});
  if(!msgs.length){chat.innerHTML='<div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>CS Research Pack · 23 域 · 247 工具 · 国产模型直连</p></div>';}
}
function newConv(){
  var cid = "conv_" + Date.now();
  conversations[cid] = {id:cid,title:"新对话",messages:[],sessionId:cid};
  renderConvTabs(); switchConv(cid);
}
function closeConv(cid, e){e.stopPropagation();if(Object.keys(conversations).length<=1)return;delete conversations[cid];if(activeConv===cid)activeConv=Object.keys(conversations)[0];renderConvTabs();switchConv(activeConv);}
function renderConvTabs(){
  var el = document.getElementById("convTabs"); if(!el) return;
  el.innerHTML = Object.values(conversations).map(function(c){return'<button class="ctr-tab'+(c.id===activeConv?" active":"")+'" data-cid="'+c.id+'" onclick="switchConv(''+c.id+'')">'+c.title+'<span class="close" onclick="closeConv(''+c.id+'',event)" style="margin-left:6px;font-size:14px;cursor:pointer;opacity:.5;display:none">×</span></button>';}).join("")+'<button class="ctr-tab-add" onclick="newConv()">＋</button>';
  // Hover to show close
  setTimeout(function(){
    document.querySelectorAll(".ctr-tab").forEach(function(t){t.onmouseenter=function(){var c=this.querySelector(".close");if(c)c.style.display="inline";};t.onmouseleave=function(){var c=this.querySelector(".close");if(c)c.style.display="none";};});
  },100);
}

// Override streamChat to scope messages per tab
var _origStream = streamChat;
streamChat = async function(prompt, mode){
  var cid = activeConv;
  // Pass session_id via fetch override
  var _origFetch = window.fetch;
  window.fetch = function(url, opts){
    if(typeof url === "string" && url.indexOf("/api/lab/chat") >= 0 && opts?.body){
      try{var body=JSON.parse(opts.body);body.session_id=cid;opts.body=JSON.stringify(body);}catch(_){}
    }
    return _origFetch(url, opts);
  };
  await _origStream(prompt, mode);
  window.fetch = _origFetch;
  // Store message
  var msgs = $("chatScroll").querySelectorAll(".chat-msg");
  if(msgs.length && conversations[cid]){
    conversations[cid].messages = [];
    msgs.forEach(function(m){conversations[cid].messages.push({el:m.cloneNode(true)});});
    var first = msgs[0]; if(first.classList.contains("user")) conversations[cid].title = first.textContent.slice(0,30)||"对话";
    renderConvTabs();
  }
  // Show changes
  showChangeBar();
};

// Save sessions
function saveSessions(){
  var data={};
  Object.keys(conversations).forEach(function(c){data[c]={id:c,title:conversations[c].title,count:(conversations[c].messages||[]).length};});
  try{localStorage.setItem("lab-tabs",JSON.stringify(data));}catch(_){}
}
setInterval(saveSessions,5000);

// Workspace tree loader
async function loadWorkspaceTree(){
  var el = $("wsTree"); if(!el) return;
  if(!activeProject){el.innerHTML='<span class="hint">选择课题查看文件</span>';return;}
  try{
    var d = await api("/api/lab/files?project_id="+activeProject.slug);
    var files = d.files||[];
    el.innerHTML = files.map(function(f){return'<div style="padding:2px 4px;cursor:pointer;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" onmouseover="this.style.background=\'var(--ocs-accent-light)\'" onmouseout="this.style.background=\'\'" onclick="var inp=$('promptInput');if(inp)inp.value+=' 查看文件: '+this.textContent.trim()">'+(f.isDir?'📁':'📄')+' '+f.name+'</div>';}).join("")||'<span class="hint">空目录</span>';
  }catch(e){el.innerHTML='<span class="hint">无法加载</span>';}
}

// Workspace change bar
async function showChangeBar(){
  var bar = $("changeBar"), list = $("changeList"); if(!bar||!list||!activeProject) return;
  try{var d=await api("/api/lab/files?project_id="+activeProject.slug);var files=d.files||[];list.textContent=files.slice(0,5).map(function(f){return f.name;}).join(", ")||"无文件";bar.style.display="block";setTimeout(function(){bar.style.display="none";},6000);}catch(_){}
}

// Refresh workspace tree on project switch
var _origLP = loadProjects;
loadProjects = async function(){await _origLP();loadWorkspaceTree();};

// Override newProjectBtn to also refresh tree
var _origNP = $("newProjectBtn").onclick;
$("newProjectBtn").onclick = async function(e){await _origNP(e);setTimeout(loadWorkspaceTree,500);};

// Init: load tree after projects
setTimeout(function(){
  var _origInit = refreshHealth;
  refreshHealth = async function(){await _origInit();setTimeout(loadWorkspaceTree,300);};
},100);

renderConvTabs();

</script></body></html>
