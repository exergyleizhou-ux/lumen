<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumen Science · 实验室</title>
<link rel="stylesheet" href="assets/app.css?v=100">
</head><body>
<div class="splash" id="splash"><div class="spinner"></div>Lumen Science 实验室</div>
<div class="shell" id="shell">
  <header class="tb">
    <div class="tb-logo"><span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span></div>
    <span class="tb-spacer"></span>
    <span class="tb-stat"><span class="tb-dot"></span><span id="packBadge">—</span></span>
    <span class="tb-stat" id="fleetBadge">—</span>
    <a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>
  <div class="main">
    <nav class="side" id="sidebarPanel"><div class="side-inner">
      <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
      <div id="projectList"></div>
      <div class="side-ft"><span class="hint" id="modeHint">—</span></div>
    </div></nav>
    <div class="resize" id="resizeLeft"></div>
    <section class="ctr">
      <div class="ctr-tabs"><button class="ctr-tab active">对话</button></div>
      <div class="scroll" id="chatScroll">
        <div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>CS Research Pack · 23 域 · 247 工具 · 国产模型直连</p>
          <div class="chips"><button class="chip" data-prompt="用 pubmed 域检索 aspirin 药理文献">文献检索</button><button class="chip" data-prompt="生成 aspirin 四源 Research Brief">生成简报</button></div></div>
      </div>
      <form class="composer" id="composer"><input id="promptInput" placeholder="描述科研任务…" autocomplete="off"><button class="btn primary" type="submit">发送</button></form>
    </section>
    <div class="resize" id="resizeRight"></div>
    <aside class="insp" id="inspectorPanel">
      <div class="insp-tabs"><button class="insp-tab active" data-pane="status">状态</button><button class="insp-tab" data-pane="files">文件</button></div>
      <div class="pane" id="statusPane"><div id="inspectorBody"></div></div>
      <div class="pane" id="filesPane" hidden><div id="fileTree"></div><div id="filePreview"></div></div>
    </aside>
  </div>
</div>
<script>
// === Minimal working Lab JS ===
var $=function(id){return document.getElementById(id);};
var activeProject=null,activeThread="main";

async function api(path,opts){
  var r=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
  var t=await r.text();try{return JSON.parse(t);}catch(_){return{raw:t}};
}

async function refreshHealth(){
  var h=await api("/api/lab/health");
  $("packBadge").textContent=(h.research_pack||{}).healthy?(h.research_pack.domain_tools||0)+" tools":"Pack ✗";
  var f=h.fleet||{};
  $("fleetBadge").textContent="⚡ "+(f.connected_total||0)+"/"+(f.cs_domains||0);
  $("modeHint").textContent=h.science_mode||"hybrid";
  $("inspectorBody").innerHTML='<div class="sr"><span class="k">状态</span><span class="v g">● 在线</span></div><div class="sr-div"></div><div class="sr"><span class="k">Research</span><span class="v">'+(h.research_pack||{}).domain_tools+' tools</span></div><div class="sr"><span class="k">Fleet</span><span class="v">'+f.connected_total+'/'+f.cs_domains+'</span></div><div class="sr-div"></div><div class="sr"><span class="k">模型</span><span class="v">'+((h.provider||{}).masked||"—")+'</span></div>';
  return h;
}

async function loadProjects(){
  var list=await api("/api/lab/projects");
  var nav=$("projectList");nav.innerHTML="";
  list.forEach(function(p){
    var b=document.createElement("button");b.textContent=p.title;
    b.onclick=function(){activeProject=p;loadProjects();refreshFiles();};
    if(activeProject&&activeProject.slug===p.slug)b.classList.add("active");
    nav.appendChild(b);
  });
  if(!activeProject&&list.length){activeProject=list[0];refreshFiles();}
}

async function ensureProject(){
  if(activeProject)return activeProject;
  activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:"默认课题"})});
  await loadProjects();return activeProject;
}

// === CHAT — the working version ===
async function streamChat(prompt){
  var p=await ensureProject();
  var ue=document.createElement("div");ue.className="chat-msg user";ue.textContent=prompt;
  $("chatScroll").appendChild(ue);
  var w=$("welcome");if(w)w.style.display="none";
  var wrap=document.createElement("div");wrap.className="chat-msg agent-wrap";$("chatScroll").appendChild(wrap);
  var think=document.createElement("details");think.className="think-block";think.open=true;
  think.innerHTML='<summary class="think-summary"><span class="think-dot"></span><span class="think-label">🧠 思考中…</span></summary><div class="think-body"></div>';
  wrap.appendChild(think);
  var tb=think.querySelector(".think-body"),tl=think.querySelector(".think-label");
  var resp=document.createElement("div");resp.className="chat-msg agent";wrap.appendChild(resp);
  var ta="",tha="",tc=0,streaming=false;
  try{
    var res=await fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug,prompt:prompt,mode:"plan",session_id:activeThread})});
    var reader=res.body.getReader();var dec=new TextDecoder();var buf="";
    while(true){var r=await reader.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);
      if(ev.kind==="thinking"){tha+=ev.text||"";tb.innerHTML=renderMD(tha);tl.textContent="🧠 思考中…";}
      else if(ev.kind==="text"){
        if(!ta){think.open=false;tl.textContent="🧠 思考完成 · 点击展开";streaming=true;}
        ta+=ev.text||"";resp.innerHTML=renderMD(ta)+(streaming?'<span class="cursor">▌</span>':'');
      }
      else if(ev.kind==="tool"||ev.tool){tc++;tl.textContent="🔧 已调用 "+tc+" 个工具";}
      else if(ev.kind==="error"){resp.innerHTML+='<span style="color:#b42318"> ❌ '+(ev.text||"err")+'</span>';}
      else if(ev.kind==="turn_done"){streaming=false;resp.innerHTML=renderMD(ta);}
    }}
  }catch(e){resp.textContent="错误: "+e.message;}
  if(!ta&&tha){resp.innerHTML=renderMD(tha);think.open=false;tl.textContent="🧠 思考 · 点击展开";}
  if(!tha&&!ta)think.remove();
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;refreshFiles();
}

// Files
async function refreshFiles(){
  var el=$("fileTree");if(!el||!activeProject)return;
  try{
    var data=await api("/api/lab/files?project_id="+activeProject.slug);
    el.innerHTML=(data.files||[]).map(function(f){return '<div class="ft-row" onclick="previewFile(\''+f.name+'\')"><span>📄</span><span class="ft-name">'+f.name+'</span><span class="ft-size">'+(f.size?fmtSize(f.size):"")+'</span></div>';}).join("");
  }catch(e){el.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

async function previewFile(path){
  var fp=$("filePreview");if(!fp||!activeProject)return;
  try{
    var data=await api("/api/lab/files/content?project_id="+activeProject.slug+"&path="+encodeURIComponent(path));
    fp.innerHTML='<div class="fp-hd">📄 '+data.path+' ('+fmtSize(data.size)+')</div><pre class="fp-body">'+escHtml(data.content)+'</pre>';
  }catch(e){fp.innerHTML='<div class="ft-err">'+e.message+'</div>';}
}

function fmtSize(b){if(!b||b<1024)return (b||0)+"B";if(b<1048576)return (b/1024).toFixed(1)+"KB";return (b/1048576).toFixed(1)+"MB";}
function renderMD(t){if(!t)return"";
  t=t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  // Tables: | a | b |\n|--|--|\n| 1 | 2 |
  t=t.replace(/\|(.+)\|\n\|[-: |]+\|\n((?:\|.+\|\n?)+)/gm,function(m,h,r){
    var hdr="<tr>"+h.split("|").map(function(c){return"<th>"+c.trim()+"</th>";}).join("")+"</tr>";
    var rows=r.trim().split("\n").map(function(rw){return"<tr>"+rw.split("|").filter(function(c){return c.trim();}).map(function(c){return"<td>"+c.trim()+"</td>";}).join("")+"</tr>";}).join("");
    return"<table>"+hdr+rows+"</table>";
  });
  // Headings, bold, code, lists
  t=t.replace(/^### (.+)$/gm,"<h3>$1</h3>").replace(/^## (.+)$/gm,"<h2>$1</h2>").replace(/^# (.+)$/gm,"<h1>$1</h1>");
  t=t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/`([^`]+)`/g,"<code>$1</code>");
  t=t.replace(/^- (.+)$/gm,"<li>$1</li>").replace(/(<li>.*<\/li>)/s,"<ul>$1</ul>");
  t=t.replace(/^> (.+)$/gm,"<blockquote>$1</blockquote>");
  t=t.replace(/\n\n/g,"</p><p>");
  if(!t.match(/^<[a-z]/))t="<p>"+t+"</p>";
  return t;}
function escHtml(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// Events
$("composer").addEventListener("submit",function(e){e.preventDefault();var p=$("promptInput").value.trim();if(!p)return;$("promptInput").value="";streamChat(p);});
$("newProjectBtn").addEventListener("click",async function(){var t=prompt("课题名称");if(!t)return;activeProject=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:t})});await loadProjects();});
document.querySelectorAll(".chip").forEach(function(b){b.addEventListener("click",function(){if(this.dataset.prompt)streamChat(this.dataset.prompt);});});
// Tabs
document.querySelectorAll(".insp-tab").forEach(function(t){t.addEventListener("click",function(){document.querySelectorAll(".insp-tab").forEach(function(b){b.classList.remove("active");});this.classList.add("active");var p=this.dataset.pane;["statusPane","filesPane","fleetPane","ketcherPane","moleculePane","settingsPane"].forEach(function(id){var el=$(id);if(el)el.hidden=id!==p+"Pane";});if(p==="files")refreshFiles();if(p==="fleet")refreshFleet();});});
// Resize
(function(){function mk(h,p,isRight){h.onmousedown=function(e){e.preventDefault();var sx=e.clientX,sw=p.getBoundingClientRect().width;h.classList.add("active");document.body.style.cursor="col-resize";document.body.style.userSelect="none";function mv(e){var d=isRight?sx-e.clientX:e.clientX-sx;p.style.width=Math.max(160,Math.min(500,sw+d))+"px";}function up(){h.classList.remove("active");document.body.style.cursor="";document.body.style.userSelect="";document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);}document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);};}var rl=$("resizeLeft"),rr=$("resizeRight"),sp=$("sidebarPanel"),ip=$("inspectorPanel");if(rl&&sp)mk(rl,sp,false);if(rr&&ip)mk(rr,ip,true);})();

// Init
(async function(){try{await refreshHealth();await loadProjects();setTimeout(function(){var s=$("splash");if(s)s.classList.add("hide");},800);}catch(e){$("inspectorBody").textContent=e.message;}})();
</script></body></html>
