<head>
<meta charset="UTF-8">

<title>Lumen Science · 实验室</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{surface:'#ffffff',card:'#f4f3ef',hover:'#ebeae4',ink:'#18181b',muted:'#71717a',dim:'#a1a1a1',accent:{DEFAULT:'#b45309',hover:'#92400e',soft:'rgba(180,83,9,.08)'},rule:'#e7e5e0',success:'#047857',warn:'#e0982f',danger:'#dc2626',user:'#18181b',userBd:'#b45309'}}}}</script>
<style>/* Oasis Lab — exact replica of demo.oasisdata2026.xyz design system */
:root {
  --font: "Geist","Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono: "Geist Mono","JetBrains Mono","SF Mono",ui-monospace,monospace;
  --display: "Instrument Serif","Georgia",serif;
}
*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%;overflow:hidden;font:14px/1.6 var(--font);color:#18181b;background:#fafaf7;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgb(231 229 224);border-radius:3px}

/* ── page chrome —— exact Oasis Nav patterns ── */
.top{display:flex;align-items:center;gap:12px;padding:0 20px;height:48px;border-bottom:1px solid rgb(231 229 224);background:rgba(250,250,247,.85);backdrop-filter:blur(12px);flex-shrink:0}
.brand{font-family:var(--display);font-size:20px;letter-spacing:-.01em;color:#18181b;font-weight:700;line-height:1}
.brand-dot{width:7px;height:7px;border-radius:50%;background:#b45309}
.top-spacer{flex:1}
.top-status{font-size:12px;color:rgb(24 24 27/.6);padding:4px 12px;background:rgb(244 243 239);border-radius:9999px}

/* ── three‑panel workbench ── */
.main{display:flex;flex:1;min-height:0;overflow:hidden}
.side{width:260px;background:rgb(244 243 239);border-right:1px solid rgb(231 229 224);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.ctr{flex:1;display:flex;flex-direction:column;min-width:0;background:#fafaf7}
.insp{width:320px;background:rgb(244 243 239);border-left:1px solid rgb(231 229 224);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.resizer{cursor:col-resize;width:4px;flex-shrink:0;background:transparent;transition:background .2s}
.resizer:hover{background:rgb(24 24 27/.4)}

/* ── sidebar sections —— Oasis card equivalents ── */
.side-section{padding:16px}
.side-label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:rgb(24 24 27/.4);margin-bottom:10px;font-weight:600}
.project-item,.skill-item{display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:12px;font-size:13px;cursor:pointer;color:rgb(24 24 27/.6);font-weight:450;transition:all .12s}
.project-item:hover,.skill-item:hover{background:rgb(235 234 228);color:#18181b}
.project-item.active{background:rgb(235 234 228);color:#18181b;font-weight:550}

/* ── conversation tabs —— same as Oasis Nav link style ── */
.conversations{display:flex;gap:1px;padding:8px 16px 0;overflow-x:auto;border-bottom:1px solid rgb(231 229 224);flex-shrink:0}
.conv-tab{padding:6px 14px;border-radius:12px 12px 0 0;font-size:12px;cursor:pointer;white-space:nowrap;color:rgb(24 24 27/.6);border:1px solid transparent;border-bottom:none;transition:all .12s}
.conv-tab.active{background:#fafaf7;color:#18181b;border-color:rgb(231 229 224);font-weight:600}
.conv-tab:hover:not(.active){color:rgb(24 24 27/.8)}

/* ── chat panel ── */
.chat{flex:1;overflow-y:auto;padding:28px 36px;scroll-behavior:smooth}

/* ── messages —— Oasis card + bubble patterns ── */
/* user = nearly-black bubble (matching Oasis primary button bg-ink) */
.chat-msg.user{display:flex;justify-content:flex-end;margin:20px 0;animation:msgIn .25s ease}
.chat-msg.agent{margin:20px 0;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.chat-msg-inner{max-width:72%;line-height:1.7;font-size:14px}
.chat-msg.user .chat-msg-inner{background:#18181b;color:#fafaf7;padding:12px 20px;border-radius:24px 24px 4px 24px;font-weight:500}
.chat-msg.agent .chat-msg-inner{padding:4px 0;color:#18181b}

/* table inside agent messages —— Oasis SchemaTable style */
.chat-msg.agent .chat-msg-inner table{border-collapse:collapse;width:100%;margin:14px 0;font-size:13px;border-radius:12px;overflow:hidden;border:1px solid rgb(231 229 224)}
.chat-msg.agent .chat-msg-inner th,.chat-msg.agent .chat-msg-inner td{padding:10px 14px;text-align:left;border:1px solid rgb(231 229 224)}
.chat-msg.agent .chat-msg-inner th{background:rgb(244 243 239);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em;color:rgb(24 24 27/.6)}
.chat-msg.agent .chat-msg-inner td{font-size:13px}

/* thinking = muted italic */
.msg-thinking{color:rgb(24 24 27/.4);font-size:12px;font-style:italic;padding:4px 0}

/* tool call = amber pill */
.msg-tool{display:inline-block;background:rgba(180,83,9,.08);color:#b45309;font-size:11px;padding:2px 8px;border-radius:6px;margin:2px 4px;font-weight:650}

/* ── composer —— Oasis input style ── */
.composer{padding:16px 28px;border-top:1px solid rgb(231 229 224);background:#fafaf7;flex-shrink:0}
.composer-inner{display:flex;align-items:flex-end;gap:10px;background:#fff;border:1px solid rgb(231 229 224);border-radius:16px;padding:8px 16px;transition:border-color .15s,box-shadow .15s}
.composer-inner:focus-within{border-color:#18181b;box-shadow:0 0 0 3px rgba(24,24,27,.05)}
.composer-inner textarea{flex:1;border:none;outline:none;resize:none;font:13px/1.55 var(--font);background:transparent;color:#18181b;padding:5px 0;min-height:24px;max-height:140px}
.composer-inner textarea::placeholder{color:rgb(24 24 27/.4)}

/* ── Oasis buttons (exact replica of ui.tsx Button) ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9999px;padding:8px 18px;font-size:13px;font-weight:500;line-height:1;transition:all .15s;border:1px solid transparent;outline:none}
.btn:focus-visible{box-shadow:0 0 0 2px rgba(24,24,27,.05)}
.btn-primary{background:#18181b;color:#fafaf7}
.btn-primary:hover{background:rgba(24,24,27,.85)}
.btn-secondary{background:#fff;color:#18181b;border-color:rgb(231 229 224)}
.btn-secondary:hover{background:#fafaf7}
.btn-ghost{background:transparent;color:rgb(24 24 27/.6)}
.btn-ghost:hover{background:#fafaf7;color:#18181b}
.btn-danger{background:#dc2626;color:#fff}
.btn-danger:hover{background:#b91c1c}
.btn-sm{padding:4px 12px;font-size:11px}

.send-btn{background:#18181b;color:#fafaf7;border:none;border-radius:9999px;padding:6px 16px;font-weight:600;font-size:13px;line-height:1;cursor:pointer;transition:background .15s;flex-shrink:0}
.send-btn:hover{background:rgba(24,24,27,.85)}
.send-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── inspector right panel ── */
.insp-tabs{display:flex;border-bottom:1px solid rgb(231 229 224);flex-shrink:0}
.insp-tab{flex:1;padding:10px 0;text-align:center;font-size:12px;color:rgb(24 24 27/.6);cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;font-weight:450}
.insp-tab.active{color:#18181b;border-bottom-color:#18181b;font-weight:600}
.insp-tab:hover:not(.active){color:rgb(24 24 27/.8)}
.insp-content{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.65}

/* ── file tree ── */
.file-row{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;color:rgb(24 24 27/.6);transition:all .12s}
.file-row:hover{background:rgb(235 234 228);color:#18181b}
.file-del{opacity:0;color:rgb(24 24 27/.4);font-size:12px;padding:2px 6px;border-radius:4px;transition:opacity .12s}
.file-row:hover .file-del{opacity:1}
.file-del:hover{color:#dc2626;background:rgba(220,38,38,.08)}

/* ── misc utility classes ── */
.text-muted{color:rgb(24 24 27/.6)}
.text-accent{color:#b45309}
.text-danger{color:#dc2626}
.text-xs{font-size:11px}
.text-sm{font-size:13px}
.font-mono{font-family:var(--mono)}
.bg-white{background:#fff}
.bg-paper{background:#fafaf7}
.rounded-xl{border-radius:12px}
.rounded-2xl{border-radius:16px}
.shadow-card{box-shadow:0 1px 2px rgba(24,24,27,.03),0 8px 24px -16px rgba(24,24,27,.1)}
.p-3{padding:12px}
.mb-1{margin-bottom:4px}
.max-h-\[200px\]{max-height:200px}
.overflow-auto{overflow:auto}
.whitespace-pre-wrap{white-space:pre-wrap}
.welcome-card:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(24,24,27,.06);border-color:#b45309}
</style>

<body class="min-h-screen" style="background:var(--paper);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased">
<div class="top">
  <span class="brand"><span class="brand-dot"></span>Lumen Science</span>
  <span class="brand-sub" style="font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:rgb(24 24 27/.4)">Lab</span>
  <span class="top-spacer"></span>
  <span class="top-status" id="fleetBadge">—</span>
  <span class="top-status" id="tokenBadge" style="margin-left:6px">— tokens</span>
  <button class="btn btn-sm btn-ghost" onclick="toggleDark()" style="font-size:16px;padding:4px 8px" id="dmToggle">🌙</button>
</div>
<div class="main">
  <div class="side" id="side">
    <div class="side-section">
      <div class="side-label">课题</div>
      <div id="projectList"></div>
      <button class="btn btn-sm btn-secondary" id="newProjectBtn" style="width:100%;margin-top:6px;justify-content:center">+ 新建课题</button>
    </div>
    <div class="side-section">
      <div class="side-label">Skills</div>
      <div id="skillList"></div>
    </div>
  </div>
  <div class="resizer" id="resizeLeft"></div>
  <div class="ctr">
    <div class="conversations" id="convTabs"></div>
    <div id="chatScroll" class="chat">
      <div id="labWelcome" style="display:flex;align-items:center;justify-content:center;height:100%;min-height:300px">
        <div style="text-align:center;max-width:520px">
          <div style="font-family:var(--display);font-size:30px;color:#18181b;letter-spacing:-.02em;margin-bottom:4px">Lumen Science</div>
          <div style="font-size:14px;color:rgb(24 24 27/.45);line-height:1.7;margin-bottom:24px">23 域科研舰队 · 247+ 工具 · 文献检索 · 化学编辑 · 分子可视化</div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:480px;margin:0 auto">
            <button class="welcome-card" onclick="document.querySelector('.composer-inner textarea').value='检索 CRISPR 基因编辑最新进展';document.querySelector('.composer-inner textarea').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:12px;text-align:center;cursor:pointer;font-size:12px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:20px;margin-bottom:4px">📚</div><div style="font-weight:600;margin-bottom:1px">文献检索</div><div style="font-size:10px;color:rgb(24 24 27/.4)">PubMed · 23域</div></button>
            <button class="welcome-card" onclick="document.querySelector('.composer-inner textarea').value='分析化合物 C16H18O9 的化学性质';document.querySelector('.composer-inner textarea').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:12px;text-align:center;cursor:pointer;font-size:12px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:20px;margin-bottom:4px">⚗️</div><div style="font-weight:600;margin-bottom:1px">化学分析</div><div style="font-size:10px;color:rgb(24 24 27/.4)">Ketcher · ChEMBL</div></button>
            <button class="welcome-card" onclick="startWorkflow()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:12px;text-align:center;cursor:pointer;font-size:12px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:20px;margin-bottom:4px">🔬</div><div style="font-weight:600;margin-bottom:1px">研究工作流</div><div style="font-size:10px;color:rgb(24 24 27/.4)">5步结构化</div></button>
          </div>
        </div>
      </div>
    </div>
    <div class="composer">
      <form class="composer-inner" id="composerForm" onsubmit="return false">
        <textarea id="promptInput" rows="1" placeholder="输入研究问题… Enter 发送"></textarea>
        <button type="button" class="send-btn" onclick="streamChat(document.getElementById('promptInput').value)">发送</button>
      </form>

  </div>
  <div class="resizer" id="resizeRight"></div>

      <div class="insp-tab" data-pane="molecule">3D</div>
    </div>
    <div class="insp-content" id="inspContent"></div>
  </div>
</div>

<script>
// ═══════════ LAB 200% — Beyond Claude Science ═══════════

// ── 1. Auto Research Brief ──
async function generateBrief() {
  if (!activeProject) return showLabToast("先选择课题");
  showLabToast("📝 生成研究摘要…");
  try {
    var r = await fetch("/api/lab/brief", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:activeProject.slug})});
    var d = await r.json();
    var insp = document.getElementById("inspContent");
    if (insp) insp.innerHTML = '<div class="side-label">研究摘要</div><div class="text-sm" style="white-space:pre-wrap;line-height:1.7">'+escHtml(d.brief||d.text||"生成中…")+'</div><button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="exportBrief()">导出 PDF</button>';
  } catch(e) { showLabToast("❌ "+e.message); }
}
function exportBrief() {
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  var text = insp.textContent;
  var blob = new Blob([text],{type:"text/plain"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "research-brief-"+(activeProject?.slug||"unknown")+".txt";
  a.click();
  showLabToast("📥 已导出");
}

// ── 2. Fleet Domain Explorer ──
async function exploreFleet() {
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  try {
    var r = await fetch("/api/lab/health");
    var d = await r.json();
    var fleet = d.fleet || {};
    var html = '<div class="side-label">科研舰队 ('+(fleet.connected_total||0)+' 域)</div>';
    html += '<input id="fleetSearch" class="oasis-input" placeholder="搜索域/工具…" oninput="filterFleet()" style="margin-bottom:8px;font-size:11px">';
    html += '<div id="fleetGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:6px;max-height:400px;overflow-y:auto">';
    var domains = fleet.cs_domains_list || [];
    domains.forEach(function(d){
      html += '<div class="fleet-card" data-name="'+escHtml(d)+'" onclick="exploreDomain(\''+escAttr(d)+'\')" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:10px;padding:10px;cursor:pointer;font-size:11px"><div style="font-weight:600;color:#18181b;margin-bottom:2px">'+escHtml(d)+'</div><div style="color:rgb(24 24 27/.4);font-size:10px">Bio-tools</div></div>';
    });
    html += '</div>';
    insp.innerHTML = html;
  } catch(e) { insp.innerHTML = '<div class="text-xs text-muted">舰队离线</div>'; }
}
function filterFleet() {
  var q = (document.getElementById("fleetSearch")?.value||"").toLowerCase();
  document.querySelectorAll(".fleet-card").forEach(function(c) {
    c.style.display = q && !(c.dataset.name||"").toLowerCase().includes(q) ? "none" : "";
  });
}
async function exploreDomain(name) {
  try {
    var r = await fetch("/api/lab/skills?domain="+encodeURIComponent(name));
    var d = await r.json();
    var skills = d.skills || [];
    var html = '<div class="side-label">'+escHtml(name)+' ('+skills.length+' 工具)</div>';
    skills.forEach(function(s){
      html += '<div class="skill-item" onclick="invokeSkill(\''+escAttr(s.name)+'\')" style="cursor:pointer">⚙ '+escHtml(s.name||s.id)+'</div>';
    });
    var insp = document.getElementById("inspContent");
    if (insp) insp.innerHTML = html;
  } catch(e) {}
}
function invokeSkill(name) {
  var inp = document.getElementById("promptInput")||document.querySelector(".composer-inner textarea");
  if (inp) { inp.value = "使用 " + name + " 工具: "; inp.focus(); }
}

// ── 3. Citation Tracker ──
var citations = [];
function trackCitation(ref) {
  citations.push({ref:ref,time:new Date().toISOString()});
  showLabToast("📎 已记录引用: "+ref.slice(0,40));
}
function showCitations() {
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  var html = '<div class="side-label">引用记录 ('+citations.length+')</div>';
  citations.forEach(function(c){
    html += '<div class="text-xs" style="padding:6px 0;border-bottom:1px solid rgb(231 229 224)"><div style="font-weight:600;color:#b45309">'+escHtml(c.ref.slice(0,60))+'</div><div style="color:rgb(24 24 27/.4);font-size:10px">'+c.time+'</div></div>';
  });
  if (!citations.length) html += '<div class="text-xs text-muted">暂无引用</div>';
  insp.innerHTML = html;
}

// ── 4. Dataset Preview ──
async function previewDataset(datasetId) {
  if (!datasetId) { datasetId = prompt("数据集 ID:"); if (!datasetId) return; }
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  try {
    var r = await fetch("/api/lab/oasis/preview", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({dataset_id:datasetId})});
    var d = await r.json();
    var html = '<div class="side-label">数据集: '+escHtml(datasetId)+'</div>';
    if (d.preview) {
      html += '<div class="text-xs" style="max-height:300px;overflow-y:auto"><pre class="font-mono text-xs">'+escHtml(JSON.stringify(d.preview,null,2))+'</pre></div>';
    }
    html += '<button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="openInOasis(\''+escAttr(datasetId)+'\')">在绿洲打开</button>';
    insp.innerHTML = html;
  } catch(e) { insp.innerHTML = '<div class="text-xs text-danger">'+e.message+'</div>'; }
}
function openInOasis(id) { window.open("https://demo.oasisdata2026.xyz/datasets/"+encodeURIComponent(id),"_blank"); }

// ── 5. Quick Actions bar in top ──
function addLabQuickActions() {
  var top = document.querySelector(".top");
  if (!top || document.getElementById("labQuickActions")) return;
  var bar = document.createElement("div");
  bar.id = "labQuickActions";
  bar.style.cssText = "display:flex;gap:6px;align-items:center;margin-left:12px";
  var actions = [
    {label:"摘要",action:"generateBrief()",title:"生成研究摘要"},
    {label:"舰队",action:"exploreFleet()",title:"浏览科研舰队"},
    {label:"引用",action:"showCitations()",title:"查看引用记录"},
    {label:"数据集",action:"previewDataset()",title:"预览绿洲数据集"},
    {label:"导出",action:"exportBrief()",title:"导出研究摘要"},
  ];
  actions.forEach(function(a){
    var btn = document.createElement("button");
    btn.className = "btn btn-sm btn-ghost";
    btn.textContent = a.label;
    btn.title = a.title;
    btn.onclick = function() { eval(a.action); };
    btn.style.cssText = "font-size:11px;padding:3px 10px";
    bar.appendChild(btn);
  });
  var spacer = top.querySelector(".top-spacer");
  if (spacer) spacer.before(bar);
}

// ── 6. Toast for Lab ──
function showLabToast(msg) {
  var t = document.getElementById("labToast");
  if (!t) {
    t = document.createElement("div"); t.id = "labToast";
    t.style.cssText = "position:fixed;bottom:80px;right:20px;z-index:100;background:#18181b;color:#fafaf7;padding:8px 16px;border-radius:9999px;font-size:12px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:opacity .3s;pointer-events:none";
    document.body.appendChild(t);
  }
  t.textContent = msg; t.style.opacity = "1";
  clearTimeout(t._to); t._to = setTimeout(function(){t.style.opacity="0"},2500);
}

// ── 7. Auto-detect citations in AI responses ──
var _origLabChat = streamChat;
streamChat = function(prompt) {
  var result = _origLabChat(prompt);
  // After 2 seconds, scan for citations in the response
  setTimeout(function() {
    var agentMsgs = document.querySelectorAll(".chat-msg.agent .chat-msg-inner");
    var last = agentMsgs[agentMsgs.length-1];
    if (!last) return;
    var text = last.textContent||"";
    var refs = text.match(/(PMID:\s*\d+|DOI:\s*10\.\S+|arXiv:\s*\S+|https?:\/\/\S+pubmed\S+)/gi);
    if (refs) refs.forEach(function(r) { trackCitation(r); });
  }, 2000);
  return result;
};

// ── Init ──
setTimeout(addLabQuickActions, 1500);
</script>
<script>
// ═══════════ 环科院标准 — Research-Grade Features ═══════════

// ── 1. Structured Research Workflow Wizard ──
var researchStage = 0;
var researchData = {question:"",hypothesis:"",method:"",results:"",conclusion:""};
var researchStages = [
  {key:"question",label:"研究问题",placeholder:"例：CRISPR-Cas9 对水稻 OsERF922 基因的编辑效率如何受 gRNA 设计影响？",icon:"❓"},
  {key:"hypothesis",label:"研究假设",placeholder:"H₀: gRNA 序列的 GC 含量与编辑效率无显著相关\nH₁: GC 含量 40-60% 的 gRNA 编辑效率显著高于其他区间",icon:"💡"},
  {key:"method",label:"实验方法",placeholder:"1. 文献系统检索 (PubMed, Web of Science)\n2. 数据提取与 Meta 分析\n3. 统计分析: 随机效应模型, p<0.05",icon:"🔬"},
  {key:"results",label:"结果与分析",placeholder:"- 共纳入 23 篇文献, 涉及 156 条 gRNA 序列\n- GC 含量 45-55% 的 gRNA 编辑效率中位数 78%\n- 与 GC 含量 <40% 组差异显著 (p=0.003)",icon:"📊"},
  {key:"conclusion",label:"结论与讨论",placeholder:"gRNA 设计中 GC 含量是影响 CRISPR 编辑效率的关键因素。建议将 GC 含量控制在 45-55% 范围内。本研究局限性: 样本量有限, 未考虑染色质开放性等表观因素。",icon:"✅"},
];

function startWorkflow() {
  researchStage = 0;
  researchData = {question:"",hypothesis:"",method:"",results:"",conclusion:""};
  showWorkflowStage();
}
function showWorkflowStage() {
  if (researchStage >= researchStages.length) {
    finishWorkflow();
    return;
  }
  var stage = researchStages[researchStage];
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  insp.innerHTML = '<div class="side-label" style="margin-bottom:12px">🔬 研究工作流 ('+(researchStage+1)+'/'+researchStages.length+')</div>'+
    '<div style="font-size:20px;margin-bottom:8px">'+stage.icon+'</div>'+
    '<div style="font-weight:700;font-size:16px;margin-bottom:12px;color:#18181b">'+stage.label+'</div>'+
    '<textarea id="workflowInput" class="oasis-input" rows="6" placeholder="'+stage.placeholder+'" style="margin-bottom:12px">'+escHtml(researchData[stage.key]||"")+'</textarea>'+
    '<div style="display:flex;gap:6px">'+
      (researchStage>0?'<button class="btn btn-secondary btn-sm" onclick="prevWorkflowStage()">← 上一步</button>':'')+
      '<button class="btn btn-primary btn-sm" onclick="nextWorkflowStage()">'+(researchStage<researchStages.length-1?'下一步 →':'完成 ✅')+'</button>'+
    '</div>';
}
function nextWorkflowStage() {
  var inp = document.getElementById("workflowInput");
  if (inp) researchData[researchStages[researchStage].key] = inp.value;
  researchStage++;
  showWorkflowStage();
}
function prevWorkflowStage() {
  var inp = document.getElementById("workflowInput");
  if (inp) researchData[researchStages[researchStage].key] = inp.value;
  researchStage = Math.max(0, researchStage-1);
  showWorkflowStage();
}
function finishWorkflow() {
  var inp = document.getElementById("workflowInput");
  if (inp) researchData[researchStages[researchStages.length-1].key] = inp.value;
  // Compile into structured prompt
  var prompt = "## 研究计划\\n\\n";
  researchStages.forEach(function(s) {
    prompt += "### "+s.label+"\\n"+ (researchData[s.key]||"(未填写)") +"\\n\\n";
  });
  prompt += "\\n请基于以上研究计划，进行系统性文献检索和数据分析。";
  document.querySelector(".composer-inner textarea") && (document.querySelector(".composer-inner textarea").value = prompt);
  var insp = document.getElementById("inspContent");
  if (insp) insp.innerHTML = '<div class="side-label">✅ 研究计划已完成</div><div class="text-xs text-muted">已填入输入框，按 Enter 开始研究</div><button class="btn btn-sm btn-primary" style="margin-top:8px" onclick="exportWorkflow()">导出计划</button>';
  showLabToast("研究计划已生成");
}
function exportWorkflow() {
  var md = "# 研究计划\\n\\n_"+new Date().toISOString()+"_\\n\\n";
  researchStages.forEach(function(s) {
    md += "## "+s.label+"\\n\\n"+ (researchData[s.key]||"") +"\\n\\n---\\n\\n";
  });
  var blob = new Blob([md],{type:"text/markdown"});
  var a = document.createElement("a");
  a.download = "research-plan.md"; a.href = URL.createObjectURL(blob); a.click();
}

// ── 2. Batch Literature Search ──
async function batchLiteratureSearch() {
  var q = prompt("批量文献检索关键词 (用逗号分隔多个查询):");
  if (!q) return;
  var queries = q.split(",").map(function(s){return s.trim()}).filter(Boolean);
  if (!queries.length) return;
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  insp.innerHTML = '<div class="side-label">批量检索 ('+queries.length+' 查询)</div><div id="batchResults"></div>';
  var results = document.getElementById("batchResults");
  queries.forEach(function(query) {
    var card = document.createElement("div");
    card.style.cssText = "background:#fff;border:1px solid rgb(231 229 224);border-radius:12px;padding:12px;margin-bottom:8px";
    card.innerHTML = '<div class="text-xs font-bold" style="color:#b45309">🔍 '+escHtml(query)+'</div><div class="text-xs text-muted">检索中…</div>';
    results.appendChild(card);
    fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:(activeProject?.slug||"default"),prompt:"检索 PubMed 中关于 \""+query+"\" 的最新文献 (最多5篇), 请列出: 标题, 作者, 期刊, 年份, PMID, 关键发现。",mode:"bypass"})})
      .then(function(r){return r.json()})
      .then(function(d){
        card.innerHTML = '<div class="text-xs font-bold" style="color:#b45309;margin-bottom:4px">🔍 '+escHtml(query)+'</div><div class="text-xs" style="white-space:pre-wrap;max-height:200px;overflow-y:auto">'+escHtml(d.text||d.brief||"无结果")+'</div>';
      })
      .catch(function(e){ card.innerHTML = '<div class="text-xs text-danger">'+e.message+'</div>'; });
  });
}

// ── 3. Data Analysis Panel ──
function openDataAnalysis() {
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  insp.innerHTML = '<div class="side-label">📊 数据分析</div>'+
    '<textarea id="dataInput" class="oasis-input" rows="6" placeholder="粘贴 CSV 或数值数据 (每行一条, 逗号分隔)&#10;例:&#10;12.5, 15.3, 11.8, 14.2&#10;9.7, 10.1, 8.9, 11.4" style="margin-bottom:8px;font-size:11px"></textarea>'+
    '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px">'+
      '<button class="btn btn-sm btn-primary" onclick="runQuickStats()">描述统计</button>'+
      '<button class="btn btn-sm btn-secondary" onclick="runNormalityTest()">正态性检验</button>'+
      '<button class="btn btn-sm btn-secondary" onclick="runTTest()">t检验</button>'+
      '<button class="btn btn-sm btn-secondary" onclick="runCorrelation()">相关性</button>'+
    '</div>'+
    '<div id="statsOutput" class="text-xs" style="max-height:300px;overflow-y:auto"></div>';
}
function parseDataInput() {
  var raw = (document.getElementById("dataInput")?.value||"").trim();
  if (!raw) return null;
  var lines = raw.split("\n").filter(function(l){return l.trim()});
  var data = [];
  lines.forEach(function(line) {
    var vals = line.split(/[,，\s]+/).map(Number).filter(function(v){return !isNaN(v)});
    if (vals.length) data.push(vals);
  });
  return data;
}
function runQuickStats() {
  var data = parseDataInput();
  if (!data) return;
  var flat = [].concat.apply([], data);
  flat.sort(function(a,b){return a-b});
  var n = flat.length;
  var mean = flat.reduce(function(a,b){return a+b},0)/n;
  var median = n%2?flat[Math.floor(n/2)]:(flat[n/2-1]+flat[n/2])/2;
  var variance = flat.reduce(function(s,v){return s+(v-mean)*(v-mean)},0)/(n-1);
  var sd = Math.sqrt(variance);
  var output = document.getElementById("statsOutput");
  if (output) output.innerHTML = '<table><thead><tr><th>统计量</th><th>值</th></tr></thead><tbody>'+
    '<tr><td>样本量</td><td>'+n+'</td></tr>'+
    '<tr><td>均值</td><td>'+mean.toFixed(4)+'</td></tr>'+
    '<tr><td>中位数</td><td>'+median.toFixed(4)+'</td></tr>'+
    '<tr><td>标准差</td><td>'+sd.toFixed(4)+'</td></tr>'+
    '<tr><td>最小值</td><td>'+flat[0].toFixed(4)+'</td></tr>'+
    '<tr><td>最大值</td><td>'+flat[n-1].toFixed(4)+'</td></tr>'+
    '<tr><td>变异系数</td><td>'+(sd/mean*100).toFixed(2)+'%</td></tr>'+
    '</tbody></table>';
}
function runTTest() {
  var data = parseDataInput();
  if (!data || data.length < 2) { showLabToast("需要至少两组数据"); return; }
  var a = data[0], b = data[1];
  var meanA = a.reduce(function(s,v){return s+v},0)/a.length;
  var meanB = b.reduce(function(s,v){return s+v},0)/b.length;
  var output = document.getElementById("statsOutput");
  if (output) output.innerHTML = '<table><thead><tr><th>组</th><th>n</th><th>均值</th><th>差值</th></tr></thead><tbody>'+
    '<tr><td>A组</td><td>'+a.length+'</td><td>'+meanA.toFixed(4)+'</td><td rowspan="2" style="font-weight:700;color:#b45309">Δ = '+(meanA-meanB).toFixed(4)+'</td></tr>'+
    '<tr><td>B组</td><td>'+b.length+'</td><td>'+meanB.toFixed(4)+'</td></tr>'+
    '</tbody></table>'+
    '<div class="text-xs text-muted" style="margin-top:4px">⚠️ 仅提供描述性对比。要获得 p 值, 请使用 Python/R 或完整统计软件。</div>';
}
function runCorrelation() {
  var data = parseDataInput();
  if (!data || data.length < 2) { showLabToast("需要至少两组变量"); return; }
  var x = data[0], y = data[1];
  var n = Math.min(x.length, y.length);
  x = x.slice(0,n); y = y.slice(0,n);
  var mx = x.reduce(function(s,v){return s+v},0)/n;
  var my = y.reduce(function(s,v){return s+v},0)/n;
  var num = 0, dx2 = 0, dy2 = 0;
  for (var i=0;i<n;i++) { num += (x[i]-mx)*(y[i]-my); dx2 += (x[i]-mx)*(x[i]-mx); dy2 += (y[i]-my)*(y[i]-my); }
  var r = num / Math.sqrt(dx2*dy2);
  var output = document.getElementById("statsOutput");
  if (output) output.innerHTML = '<table><thead><tr><th>变量</th><th>n</th><th>均值</th></tr></thead><tbody>'+
    '<tr><td>X</td><td>'+n+'</td><td>'+mx.toFixed(4)+'</td></tr>'+
    '<tr><td>Y</td><td>'+n+'</td><td>'+my.toFixed(4)+'</td></tr>'+
    '</tbody></table>'+
    '<div style="font-weight:700;font-size:18px;color:'+(Math.abs(r)>0.5?"#b45309":"#047857")+';margin-top:8px">r = '+r.toFixed(4)+'</div>'+
    '<div class="text-xs text-muted">'+(Math.abs(r)>0.7?"强相关":Math.abs(r)>0.4?"中等相关":"弱相关或无相关")+'</div>';
}
function runNormalityTest() {
  var data = parseDataInput();
  if (!data) return;
  var flat = [].concat.apply([], data).sort(function(a,b){return a-b});
  var n = flat.length;
  var mean = flat.reduce(function(s,v){return s+v},0)/n;
  var sd = Math.sqrt(flat.reduce(function(s,v){return s+(v-mean)*(v-mean)},0)/(n-1));
  // Shapiro-Wilk approximation
  var output = document.getElementById("statsOutput");
  if (output) output.innerHTML = '<table><thead><tr><th>参数</th><th>值</th></tr></thead><tbody>'+
    '<tr><td>均值 ± SD</td><td>'+mean.toFixed(4)+' ± '+sd.toFixed(4)+'</td></tr>'+
    '<tr><td>偏度</td><td>'+((flat.reduce(function(s,v){return s+Math.pow((v-mean)/sd,3)},0)/n)).toFixed(4)+'</td></tr>'+
    '<tr><td>峰度</td><td>'+((flat.reduce(function(s,v){return s+Math.pow((v-mean)/sd,4)},0)/n - 3)).toFixed(4)+'</td></tr>'+
    '</tbody></table>'+
    '<div class="text-xs text-muted" style="margin-top:4px">偏度≈0且峰度≈0表明近似正态。精确检验建议用 Shapiro-Wilk (Python scipy.stats)</div>';
}

// ── 4. Export Formats ──
function exportAsFormat(format) {
  var messages = document.querySelectorAll(".chat-msg");
  if (!messages.length) return showLabToast("无内容可导出");
  var output = "";
  if (format === "md") {
    output = "# Lumen Lab 研究记录\\n\\n_"+new Date().toISOString()+"_\\n\\n";
    messages.forEach(function(m) {
      var role = m.classList.contains("user") ? "## 研究者" : "### AI 分析";
      output += role + "\\n\\n" + (m.textContent||"").trim() + "\\n\\n---\\n\\n";
    });
  } else if (format === "csv") {
    output = "role,content\\n";
    messages.forEach(function(m) {
      output += (m.classList.contains("user")?"user":"assistant")+",\""+(m.textContent||"").replace(/"/g,'""').trim()+"\"\\n";
    });
  } else if (format === "bibtex") {
    var refs = citations.map(function(c,i) {
      return "@article{ref"+i+",\\n  title={"+c.ref+"},\\n  note={Captured "+c.time+"}\\n}";
    });
    output = refs.join("\\n\\n") || "% No citations tracked";
  }
  var blob = new Blob([output],{type:"text/plain"});
  var a = document.createElement("a");
  a.download = "research-"+new Date().toISOString().slice(0,10)+"."+format;
  a.href = URL.createObjectURL(blob); a.click();
  showLabToast("📥 已导出 "+format.toUpperCase());
}

// ── 5. Update quick actions with new research tools ──
function upgradeQuickActions() {
  var bar = document.getElementById("labQuickActions");
  if (!bar) { setTimeout(upgradeQuickActions, 1000); return; }
  bar.innerHTML = "";
  var actions = [
    {label:"🔬 工作流",action:"startWorkflow()",title:"结构化研究工作流"},
    {label:"📚 批量检索",action:"batchLiteratureSearch()",title:"批量文献检索"},
    {label:"📊 数据分析",action:"openDataAnalysis()",title:"描述统计/t检验/相关性"},
    {label:"🌐 舰队",action:"exploreFleet()",title:"浏览 23 域科研工具"},
    {label:"📎 引用",action:"showCitations()",title:"引用记录"},
    {label:"📥 MD",action:"exportAsFormat('md')",title:"导出 Markdown"},
    {label:"📥 CSV",action:"exportAsFormat('csv')",title:"导出 CSV"},
    {label:"📥 BibTeX",action:"exportAsFormat('bibtex')",title:"导出 BibTeX"},
  ];
  actions.forEach(function(a){
    var btn = document.createElement("button");
    btn.className = "btn btn-sm btn-ghost";
    btn.textContent = a.label;
    btn.title = a.title;
    btn.onclick = function() { eval(a.action); };
    btn.style.cssText = "font-size:10px;padding:3px 8px";
    bar.appendChild(btn);
  });
}
setTimeout(upgradeQuickActions, 2000);

// ── 6. Saved Searches ──
var savedSearches = JSON.parse(localStorage.getItem("lab-saved-searches")||"[]");
function saveCurrentSearch() {
  var inp = document.querySelector(".composer-inner textarea");
  var q = inp ? inp.value.trim() : "";
  if (!q) return showLabToast("输入框为空");
  savedSearches.unshift({q:q,time:new Date().toISOString()});
  if (savedSearches.length > 20) savedSearches = savedSearches.slice(0,20);
  localStorage.setItem("lab-saved-searches", JSON.stringify(savedSearches));
  showLabToast("⭐ 已保存搜索");
}
function showSavedSearches() {
  var insp = document.getElementById("inspContent");
  if (!insp) return;
  var html = '<div class="side-label">已保存的搜索 ('+savedSearches.length+')</div>';
  savedSearches.forEach(function(s,i) {
    html += '<div class="text-xs" style="padding:6px 0;border-bottom:1px solid rgb(231 229 224);cursor:pointer" onclick="document.querySelector(\'.composer-inner textarea\').value=\''+escAttr(s.q)+'\';document.querySelector(\'.composer-inner textarea\').focus()">⭐ '+escHtml(s.q).slice(0,80)+'</div>';
  });
  if (!savedSearches.length) html += '<div class="text-xs text-muted">暂无</div>';
  insp.innerHTML = html;
}
