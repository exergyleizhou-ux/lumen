<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumen Science · 实验室</title>
<link rel="stylesheet" href="assets/app.css?v=7">
</head>
<body>
<!-- Splash -->
<div class="splash" id="splash"><div class="spinner"></div>Lumen Science 实验室</div>

<div class="shell" id="shell">
  <header class="tb">
    <div class="tb-logo"><span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span></div>
    <span class="tb-spacer"></span>
    <span class="tb-stat"><span class="tb-dot"></span><span id="packBadge">—</span></span>
    <span class="tb-stat" id="fleetBadge">—</span>
    <button class="tb-btn" id="themeToggle" title="切换暗色模式">☀</button>
    <button class="tb-btn" id="settingsBtn" title="设置">⚙</button>
    <a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>

  <div class="main">
    <!-- Left sidebar -->
    <nav class="side" id="sidebarPanel">
      <div class="side-inner">
        <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
        <div id="projectList"></div>
        <div id="skillsList" style="margin-top:6px"></div>
        <div class="side-ft"><span class="hint" id="modeHint">—</span></div>
      </div>
    </nav>
    <div class="resize" id="resizeLeft"></div>

    <!-- Center chat -->
    <section class="ctr">
      <div class="ctr-tabs" id="threadTabs">
        <button class="ctr-tab active" data-thread="main">对话</button>
        <button class="ctr-tab-add" id="newThreadBtn" title="新建对话">＋</button>
      </div>
      <div class="scroll" id="chatScroll">
        <div class="hero" id="welcome">
          <h2>Lumen Science 实验室</h2>
          <p>CS Research Pack · 23 域 · 247 工具 · 28 fleet · 国产模型直连</p>
          <div class="chips">
            <button class="chip" data-prompt="用 pubmed 域检索 aspirin 药理文献">文献检索</button>
            <button class="chip" data-prompt="生成 aspirin 四源 Research Brief">生成简报</button>
            <button class="chip" data-brief="EGFR 抑制剂">一键 Brief</button>
          </div>
        </div>
      </div>
      <form class="composer" id="composer">
        <input id="promptInput" placeholder="描述科研任务… ⌘K 命令面板" autocomplete="off">
        <div class="composer-menu" id="composerMenu"></div>
        <button class="btn primary" type="submit">发送</button>
      </form>
    </section>
    <div class="resize" id="resizeRight"></div>

    <!-- Right inspector -->
    <aside class="insp" id="inspectorPanel">
      <div class="insp-tabs">
        <button class="insp-tab active" data-pane="status">状态</button>
        <button class="insp-tab" data-pane="files">文件</button>
        <button class="insp-tab" data-pane="fleet">舰队</button>
        <button class="insp-tab" data-pane="ketcher">化学</button>
        <button class="insp-tab" data-pane="molecule">分子</button>
        <button class="insp-tab" data-pane="settings">设置</button>
      </div>
      <div class="pane" id="statusPane"><div id="inspectorBody"></div></div>
      <div class="pane" id="filesPane" hidden>
        <div id="fileTree"></div>
        <div id="filePreview"></div>
      </div>
      <div class="pane" id="fleetPane" hidden>
        <div class="empty-state" id="fleetEmpty"><span class="icon">🚀</span>舰队状态加载中…</div>
        <div id="fleetList"></div>
      </div>
      <div class="pane" id="ketcherPane" hidden>
        <p class="hint" style="padding:0 0 8px">Ketcher 分子编辑器</p>
        <iframe id="ketcherFrame" src="about:blank" title="Ketcher"></iframe>
      </div>
      <div class="pane" id="moleculePane" hidden>
        <p class="hint" style="padding:0 0 8px">3Dmol 蛋白/分子 3D 预览</p>
        <div id="molViewer"></div>
      </div>
      <div class="pane" id="settingsPane" hidden>
        <div class="set-card">
          <h3>🌓 外观</h3>
          <div class="set-row"><span class="k">暗色模式</span><button class="btn sm" id="darkToggle">切换</button></div>
        </div>
        <div class="set-card">
          <h3>🔬 Research Pack</h3>
          <div id="researchInfo"><span class="hint">加载中…</span></div>
        </div>
        <div class="set-card">
          <h3>📋 快捷操作</h3>
          <button class="btn fill" id="refreshFleetBtn">刷新舰队</button>
          <button class="btn fill" style="margin-top:6px" id="c2dBtn">C2D 算法列表</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<!-- File drop overlay -->
<div class="drop-overlay" id="dropOverlay">将文件拖放到此处</div>

<!-- ⌘K -->
<div id="cmdPalette" class="overlay" hidden>
  <div class="overlay-box">
    <input id="paletteInput" placeholder="搜索命令…" autofocus>
    <div id="paletteResults"></div>
  </div>
</div>

<script src="assets/app.js?v=7" defer></script>
</body>
</html>
