<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lumen Science · 实验室</title>
  <link rel="stylesheet" href="app.css?v=22">
</head>
<body>
  <div id="splash" class="splash"><span class="spinner"></span>正在加载实验室…</div>

  <div class="shell">
    <header class="tb">
      <button type="button" class="tb-btn mobile-only" id="btnSide" title="课题">☰</button>
      <div class="tb-logo">
        <span class="tb-lumen">Lumen</span>
        <span class="tb-label">Science Lab</span>
      </div>
      <span class="tb-spacer"></span>
      <span class="tb-stat"><span class="tb-dot" id="liveDot"></span><span id="runStatus">就绪</span></span>
      <span class="tb-stat" id="packBadge">—</span>
      <span class="tb-stat" id="fleetBadge">—</span>
      <span class="tb-stat hide-sm" id="modeHint">hybrid</span>
      <a class="tb-link hide-sm" id="bridgeLink" href="/lumen-science/?embed=1&oasis=1">Bridge</a>
      <button class="tb-btn" id="dmToggle" type="button" title="主题">🌙</button>
      <button type="button" class="tb-btn mobile-only" id="btnInsp" title="面板">▦</button>
    </header>

    <div class="main">
      <aside class="side" id="sidebarPanel">
        <div class="side-inner">
          <div class="set-card">
            <div class="set-k">当前课题</div>
            <div class="set-v" id="activeProjectName">未选择</div>
            <div class="hint mono" id="activeProjectMeta"></div>
            <div class="btn-row">
              <button class="btn primary sm" id="newProjectBtn" type="button">＋ 新建</button>
              <button class="btn sm" id="refreshAllBtn" type="button">刷新</button>
            </div>
          </div>
          <div class="set-k soft">课题列表</div>
          <div id="projectList" class="proj-list"></div>
          <div class="set-k soft">快捷任务</div>
          <div class="chip-col">
            <button class="chip" type="button" data-brief="aspirin">生成 Brief · aspirin</button>
            <button class="chip" type="button" data-prompt="用 pubmed 检索阿司匹林近三年高被引文献，列 5 条并给中文摘要。">PubMed 文献检索</button>
            <button class="chip" type="button" data-prompt="列出当前工作区文件结构，指出缺什么实验产物，并建议下一步。">检查工作区</button>
            <button class="chip" type="button" data-prompt="列出可用的 C2D 算法与如何在绿洲上架。">C2D 算法</button>
          </div>
        </div>
        <div class="side-ft">
          <span class="hint">⌘K 命令面板 · Enter 发送 · Shift+Enter 换行</span>
        </div>
      </aside>

      <div class="resize" id="resizeLeft" aria-hidden="true"></div>

      <section class="ctr">
        <div class="ctr-top">
          <div class="ctr-tabs" id="convTabs"></div>
          <button class="ctr-tab-add" type="button" id="newConvBtn" title="新对话">＋</button>
        </div>
        <div id="chatScroll">
          <section id="welcome" class="hero">
            <h2>科研对话工作台</h2>
            <p>体验对标 OpenClaudeScience：工具卡片 · 审批门闩 · 文件预览 · 溯源</p>
            <div class="chips">
              <button class="chip" type="button" data-brief="aspirin">生成 Brief</button>
              <button class="chip" type="button" data-prompt="检索 PubMed 上阿司匹林相关最新文献，给出 3 条要点。">文献检索</button>
              <button class="chip" type="button" data-prompt="解释当前课题工作区里有哪些文件，并建议下一步实验。">检查工作区</button>
            </div>
          </section>
        </div>
        <form id="composer" class="composer">
          <div class="composer-top">
            <select id="chatMode" class="mode-sel" title="权限模式">
              <option value="agent" selected>Agent · 工具+审批</option>
              <option value="plan">Plan · 只规划</option>
              <option value="bypass">Bypass · 全自动</option>
              <option value="default">Default</option>
            </select>
            <button type="button" class="btn sm" id="btnStop" disabled title="中止当前回合">停止</button>
            <label class="btn sm upload-btn">
              附件
              <input type="file" id="fileUpload" hidden />
            </label>
          </div>
          <textarea id="promptInput" rows="2" placeholder="描述科研任务… Enter 发送 · Shift+Enter 换行" autocomplete="off"></textarea>
          <div class="composer-bot">
            <span class="hint" id="composerHint">就绪</span>
            <button class="btn primary" type="submit" id="btnSend">发送</button>
          </div>
        </form>
      </section>

      <div class="resize" id="resizeRight" aria-hidden="true"></div>

      <aside class="insp" id="inspectorPanel">
        <div class="insp-tabs">
          <button class="insp-tab active" type="button" data-pane="status">状态</button>
          <button class="insp-tab" type="button" data-pane="files">文件</button>
          <button class="insp-tab" type="button" data-pane="skills">技能</button>
          <button class="insp-tab" type="button" data-pane="ketcher">化学</button>
          <button class="insp-tab" type="button" data-pane="molecule">分子</button>
        </div>
        <div class="insp-body">
          <div id="statusPane"><div id="inspectorBody" class="insp-scroll"></div></div>
          <div id="filesPane" class="insp-scroll" style="display:none">
            <div class="file-bar">
              <button type="button" class="btn sm" id="fileUp" title="上级">↑</button>
              <span class="mono file-cwd" id="fileCwd">.</span>
              <button type="button" class="btn sm" id="fileRefresh">↻</button>
            </div>
            <div id="fileTree"></div>
            <div id="filePreview" class="fp"></div>
          </div>
          <div id="skillsPane" class="insp-scroll" style="display:none">
            <div id="skillsBody" class="hint">加载技能目录…</div>
          </div>
          <div id="ketcherPane" style="display:none;height:100%">
            <iframe id="ketcherFrame" title="Ketcher" style="width:100%;height:100%;border:none"></iframe>
          </div>
          <div id="moleculePane" style="display:none;height:100%">
            <div id="molViewer" style="width:100%;height:100%"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div id="sideMask" class="mask" hidden></div>

  <div id="cmdPalette" class="palette" style="display:none">
    <div class="palette-box">
      <input id="paletteInput" type="text" placeholder="搜索命令…" autocomplete="off" />
      <div id="paletteResults"></div>
    </div>
  </div>

  <script src="app.js?v=22"></script>
</body>
</html>
