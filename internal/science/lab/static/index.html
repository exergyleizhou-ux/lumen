<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Lumen Science · 实验室</title>
  <link rel="stylesheet" href="app.css?v=13">
</head>
<body>
  <div id="splash" class="splash"><span class="spinner"></span>正在加载实验室…</div>

  <div class="shell">
    <header class="tb">
      <div class="tb-logo">
        <span class="tb-lumen">Lumen</span>
        <span class="tb-label">Science Lab</span>
      </div>
      <span class="tb-spacer"></span>
      <span class="tb-stat"><span class="tb-dot"></span><span id="packBadge">—</span></span>
      <span class="tb-stat" id="fleetBadge">—</span>
      <span class="tb-stat" id="modeHint">hybrid</span>
      <a class="tb-link" id="bridgeLink" href="/lumen-science/?embed=1&oasis=1">Bridge</a>
      <button class="tb-btn" id="dmToggle" type="button" title="主题">🌙</button>
    </header>

    <div class="main">
      <aside class="side" id="sidebarPanel">
        <div class="side-inner">
          <div class="set-card">
            <div class="set-k">🔬 当前课题</div>
            <div class="set-v" id="activeProjectName">未选择</div>
            <div class="hint" id="activeProjectMeta"></div>
            <div style="display:flex;gap:6px;margin-top:10px;flex-wrap:wrap">
              <button class="btn primary sm" id="newProjectBtn" type="button">＋ 新建</button>
              <button class="btn sm chip" type="button" data-brief="aspirin">📋 Brief</button>
              <button class="btn sm chip" type="button" data-prompt="列出可用的 C2D 算法并说明如何上架绿洲">🏷 C2D</button>
            </div>
          </div>
          <div id="projectList"></div>
        </div>
        <div class="side-ft">
          <span class="hint">⌘K 命令面板</span>
        </div>
      </aside>

      <div class="resize" id="resizeLeft" aria-hidden="true"></div>

      <section class="ctr">
        <div style="display:flex;align-items:flex-end;border-bottom:1px solid var(--ocs-line);padding:6px 10px 0">
          <div class="ctr-tabs" id="convTabs" style="flex:1;border:none;padding:0"></div>
          <button class="ctr-tab-add" type="button" onclick="newConv()" title="新对话">＋</button>
        </div>
        <div id="chatScroll">
          <section id="welcome" class="hero">
            <h2>Lumen Science 实验室</h2>
            <p>对标 OpenClaudeScience · CS Research Pack · 国产模型 · 绿洲 C2D</p>
            <div class="chips">
              <button class="chip" type="button" data-brief="aspirin">生成 Brief</button>
              <button class="chip" type="button" data-prompt="检索 PubMed 上阿司匹林相关最新文献">文献检索</button>
              <button class="chip" type="button" data-prompt="解释当前课题工作区里有哪些文件，并建议下一步实验">检查工作区</button>
            </div>
          </section>
        </div>
        <form id="composer" class="composer">
          <select id="chatMode" class="btn sm" style="height:38px" title="agent=可工具+审批 · plan=只规划 · bypass=全自动">
            <option value="agent" selected>Agent</option>
            <option value="plan">Plan</option>
            <option value="bypass">Bypass</option>
            <option value="default">Default</option>
          </select>
          <input id="promptInput" type="text" placeholder="描述科研任务… Enter 发送" autocomplete="off" />
          <button class="btn primary" type="submit">发送</button>
        </form>
      </section>

      <div class="resize" id="resizeRight" aria-hidden="true"></div>

      <aside class="insp" id="inspectorPanel">
        <div class="insp-tabs">
          <button class="insp-tab active" type="button" data-pane="status">状态</button>
          <button class="insp-tab" type="button" data-pane="files">文件</button>
          <button class="insp-tab" type="button" data-pane="skills">技能</button>
          <button class="insp-tab" type="button" data-pane="ketcher">化学</button>
          <button class="insp-tab" type="button" data-pane="molecule">分子</button>
        </div>
        <div class="insp-body">
          <div id="statusPane"><div id="inspectorBody" class="insp-scroll"></div></div>
          <div id="filesPane" class="insp-scroll" style="display:none">
            <div id="fileTree"></div>
            <div id="filePreview" class="fp"></div>
          </div>
          <div id="skillsPane" class="insp-scroll" style="display:none">
            <div id="skillsBody" class="hint">加载技能目录…</div>
          </div>
          <div id="ketcherPane" style="display:none;height:100%">
            <iframe id="ketcherFrame" title="Ketcher" style="width:100%;height:100%;border:none"></iframe>
          </div>
          <div id="moleculePane" style="display:none;height:100%">
            <div id="molViewer" style="width:100%;height:100%"></div>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <div id="cmdPalette" class="palette" style="display:none">
    <div class="palette-box">
      <input id="paletteInput" type="text" placeholder="搜索命令…" autocomplete="off" />
      <div id="paletteResults"></div>
    </div>
  </div>

  <script src="app.js?v=13"></script>
</body>
</html>
