<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8">
<title>Lumen Lab</title><link rel="stylesheet" href="assets/app.css?v=1">
</head><body>
<div class="shell" id="shell">
  <header class="tb">
    <span class="tb-lumen">Lumen</span><span class="tb-label">Science Lab</span>
    <span class="tb-spacer"></span>
    <span class="tb-stat" id="packBadge">—</span>
    <span class="tb-stat" id="fleetBadge">—</span>
    <a class="tb-link" href="http://127.0.0.1:18990/">Bridge</a>
  </header>
  <div class="main">
    <nav class="side"><div class="side-inner">
      <button class="btn primary fill" id="newProjectBtn">＋ 新建课题</button>
      <div id="projectList"></div>
    </div></nav>
    <div class="resize" id="resizeLeft"></div>
    <section class="ctr">
      <div class="scroll" id="chatScroll">
        <div class="hero" id="welcome"><h2>Lumen Science 实验室</h2><p>输入消息开始科研对话</p></div>
      </div>
      <form class="composer" id="composer"><input id="promptInput" placeholder="描述科研任务…" autocomplete="off"><button class="btn primary" type="submit">发送</button></form>
    </section>
    <div class="resize" id="resizeRight"></div>
    <aside class="insp"><div class="insp-tabs"><button class="insp-tab active">状态</button></div>
      <div class="pane" id="statusPane"><div id="inspectorBody">加载中…</div></div>
    </aside>
  </div>
</div>
<script>
var $=function(id){return document.getElementById(id);};
var activeProject=null;

async function api(path,opts){
  var r=await fetch(path,{headers:{"Content-Type":"application/json"},...opts});
  return r.json();
}

async function init(){
  try{
    var h=await api("/api/lab/health");
    $("packBadge").textContent=(h.research_pack||{}).healthy?"247 tools":"Pack ✗";
    $("fleetBadge").textContent=((h.fleet||{}).connected_total||0)+" fleet";
    $("inspectorBody").innerHTML="<b>在线</b> · fleet "+((h.fleet||{}).connected_total||0)+"/"+((h.fleet||{}).cs_domains||0)+" · "+((h.research_pack||{}).domain_tools||0)+" tools";
  }catch(e){$("inspectorBody").textContent="错误: "+e.message;}
}

// Chat — simple working version
async function streamChat(prompt){
  var p=await api("/api/lab/projects",{method:"POST",body:JSON.stringify({title:"默认课题"})}).catch(function(){return{slug:"debug"};});
  var ue=document.createElement("div");ue.style.cssText="background:#4c1d95;color:#fff;padding:8px 14px;border-radius:12px;margin:8px 0 8px auto;max-width:70%";ue.textContent=prompt;$("chatScroll").appendChild(ue);
  $("welcome")?.remove();
  var ae=document.createElement("div");ae.style.cssText="padding:8px 0;white-space:pre-wrap;line-height:1.6";$("chatScroll").appendChild(ae);
  var ta="";
  try{
    var res=await fetch("/api/lab/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({project_id:p.slug||"debug",prompt:prompt,mode:"plan"})});
    var reader=res.body.getReader();var dec=new TextDecoder();var buf="";
    while(true){var r=await reader.read();if(r.done)break;buf+=dec.decode(r.value,{stream:true});var lines=buf.split("\n");buf=lines.pop();for(var i=0;i<lines.length;i++){var line=lines[i];if(line.indexOf("data:")!==0)continue;var json=line.slice(5).trim();if(!json.startsWith("{"))continue;var ev=JSON.parse(json);if(ev.text&&(ev.kind==="text"||ev.kind==="thinking")){ta+=ev.text;ae.textContent=ta;}}}
  }catch(e){ae.textContent="错误: "+e.message;}
  $("chatScroll").scrollTop=$("chatScroll").scrollHeight;
}

$("composer").addEventListener("submit",function(e){e.preventDefault();var p=$("promptInput").value.trim();if(!p)return;$("promptInput").value="";streamChat(p);});
init();
</script></body></html>
