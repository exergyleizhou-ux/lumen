<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lumen · 编程智能体</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{colors:{paper:'#fafaf7',surface:'#ffffff',card:'#f4f3ef',hover:'#ebeae4',ink:'#18181b',muted:'#71717a',dim:'#a1a1a1',accent:{DEFAULT:'#b45309',hover:'#92400e',soft:'rgba(180,83,9,.08)'},rule:'#e7e5e0',success:'#047857',warn:'#e0982f',danger:'#dc2626'}}}}</script>
<style>
*{box-sizing:border-box}body{margin:0;font:14px/1.6 var(--font),sans-serif;background:#fafaf7;color:#e2e8f0;-webkit-font-smoothing:antialiased}
.msg-fade{animation:in .25s ease}@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.skeleton{background:linear-gradient(90deg,#f4f3ef 25%,#ebeae4 50%,#f4f3ef 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#475569;border-radius:3px}
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/font.css">
</head>
<body class="min-h-screen" style="background:var(--paper);color:var(--ink);font-family:var(--font);-webkit-font-smoothing:antialiased">
<div id="app">
  <aside class="sidebar">
    <div class="side-section" style="padding-top:20px">
      <div class="brand" style="font-family:var(--display);font-size:20px;margin-bottom:4px">Lumen</div>
      <div style="font-size:10px;color:rgb(24 24 27/.4);text-transform:uppercase;letter-spacing:.05em">编程智能体</div>
    </div>
    <div class="side-section">
      <input id="sessionSearch" class="oasis-input" placeholder="搜索会话…" style="font-size:11px">
    </div>
    <div class="side-section">
      <div class="side-label">模型</div>
      <select id="providerSelect" class="oasis-input" style="font-size:11px">
        <option>deepseek-chat</option><option>deepseek-v4-pro</option>
        <option>qwen-plus</option><option>moonshot-v1</option>
        <option>glm-4</option><option>minimax-m3</option>
      </select>
    </div>
    <div class="side-section">
      <div class="side-label">权限</div>
      <select id="modeSelect" class="oasis-input" style="font-size:11px">
        <option value="full">Full</option><option value="plan">Plan</option><option value="ask">Ask</option>
      </select>
    </div>
    <div class="side-section">
      <div class="side-label">记忆</div>
      <div id="memList"></div>
    </div>
    <nav id="sessionList" style="flex:1;overflow-y:auto;padding:8px"></nav>
    <div id="gitStatus" style="padding:8px 16px;font-size:10px;color:rgb(24 24 27/.4);border-top:1px solid rgb(231 229 224)"></div>
  </aside>
  <div class="chat-area">
    <div class="top-bar">
      <span class="brand" style="font-family:var(--display);font-size:16px">Lumen</span>
      <div class="top-spacer"></div>
      <span id="statTokens" style="font-size:11px;color:rgb(24 24 27/.4);margin-right:8px"></span>
      <span id="statModel" style="font-size:11px;color:rgb(24 24 27/.4)"></span>
    </div>
    <div class="conv-tabs" id="convTabs"></div>
    <div id="chatScroll" class="chat">
      <div id="welcomeState" style="display:flex;align-items:center;justify-content:center;height:100%;min-height:300px">
        <div style="text-align:center;max-width:480px">
          <div style="font-family:var(--display);font-size:32px;color:#18181b;letter-spacing:-.02em;margin-bottom:6px">Lumen</div>
          <div style="font-size:15px;color:rgb(24 24 27/.45);line-height:1.7;margin-bottom:28px">AI 编程助手 — 审查代码、解释架构、修复错误、生成测试</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:360px;margin:0 auto">
            <button class="welcome-card" onclick="$('input').value='审查最近的代码改动';$('input').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:14px 16px;text-align:left;cursor:pointer;font-size:13px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:18px;margin-bottom:4px">🔍</div><div style="font-weight:600;margin-bottom:2px">代码审查</div><div style="font-size:11px;color:rgb(24 24 27/.4)">找 bug 和隐患</div></button>
            <button class="welcome-card" onclick="$('input').value='解释当前项目的整体架构';$('input').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:14px 16px;text-align:left;cursor:pointer;font-size:13px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:18px;margin-bottom:4px">🏗️</div><div style="font-weight:600;margin-bottom:2px">架构分析</div><div style="font-size:11px;color:rgb(24 24 27/.4)">理解项目结构</div></button>
            <button class="welcome-card" onclick="$('input').value='修复所有的 lint 错误';$('input').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:14px 16px;text-align:left;cursor:pointer;font-size:13px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:18px;margin-bottom:4px">🔧</div><div style="font-weight:600;margin-bottom:2px">修复错误</div><div style="font-size:11px;color:rgb(24 24 27/.4)">lint & type</div></button>
            <button class="welcome-card" onclick="$('input').value='为关键模块编写完整的单元测试';$('input').focus()" style="background:#fff;border:1px solid rgb(231 229 224);border-radius:14px;padding:14px 16px;text-align:left;cursor:pointer;font-size:13px;color:#18181b;transition:all .15s;font-family:var(--font)"><div style="font-size:18px;margin-bottom:4px">✅</div><div style="font-weight:600;margin-bottom:2px">写测试</div><div style="font-size:11px;color:rgb(24 24 27/.4)">单元 & 集成</div></button>
          </div>
        </div>
      </div>
    </div>
    <div class="composer">
      <div class="composer-inner">
        <textarea id="input" rows="1" placeholder="描述任务… Enter 发送，Shift+Enter 换行"></textarea>
        <div class="composer-actions">
          <button class="btn btn-sm btn-primary" id="sendBtn">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
