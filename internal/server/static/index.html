<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumen · 绿洲编程智能体</title><!-- goal:d6aa846b round9 -->
  <link rel="stylesheet" href="assets/app.css?v=7" />


<script src="https://cdn.tailwindcss.com"></script><style>.session-item{display:flex;align-items:center}.session-del{display:none;font-size:14px;color:#ef4444;cursor:pointer;padding:2px 6px;border-radius:4px}.session-item:hover .session-del{display:block}</style>
</head>
<body>
  <div class="app" id="app">
    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>
    <div style="border-bottom:1px solid var(--rule);padding:8px 12px;cursor:pointer;font-size:11px;font-weight:650;color:var(--muted)" onclick="this.nextElementSibling.hidden=!this.nextElementSibling.hidden">📁 项目文件 <span style="float:right">▾</span></div>
      <div id="projectTree" style="max-height:240px;overflow:auto;padding:4px 8px;font-size:11px"><span style="color:var(--muted)">加载中…</span></div>
      <aside class="sidebar" id="sidebar" aria-label="会话">
      <div class="sidebar-hd">
        <a class="brand" href="https://demo.oasisdata2026.xyz" target="_blank" rel="noopener">
          <span class="brand-mark">Lumen</span>
          <span class="brand-sub">绿洲</span>
        </a>
      </div>
      <button class="btn-new" id="newChatBtn" type="button">
        <span class="btn-new-icon" aria-hidden="true">+</span>
        新对话
      </button>
      <div style="padding:4px 12px"><input id="sessionSearch" placeholder="搜索会话…" style="width:100%;height:28px;padding:0 8px;font-size:11px;border:1px solid var(--rule);border-radius:8px;background:var(--sidebar);color:var(--ink);outline:none" oninput="filterSessions(this.value)"></div>
      <nav class="session-list" id="sessionList" aria-label="历史会话">
        <p class="session-empty" id="sessionEmpty">暂无历史会话</p>
      </nav>
      <div class="sidebar-ft">
        <button class="mem-pill" id="memPill" type="button" title="管理记忆">
          <span class="mem-dot" aria-hidden="true"></span>
          <span id="memCount">0</span> 条记忆
        </button>
        <button class="sidebar-link" id="doctorBtn" type="button">自检</button>
        <button class="sidebar-link" id="skillsBtn" type="button">Skills</button>
        <a class="sidebar-link" href="https://github.com/exergyleizhou-ux/lumen" target="_blank" rel="noopener">源码</a>
      </div>
