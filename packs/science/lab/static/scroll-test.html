<!DOCTYPE html><html><head><meta charset="UTF-8"><style>
html,body{height:100%;margin:0;overflow:hidden}
.shell{height:100vh;display:flex;flex-direction:column;overflow:hidden;padding:14px;box-sizing:border-box}
.main{display:flex;flex:1;min-height:0;overflow:hidden}
.ctr{flex:1;min-width:0;min-height:0;display:flex;flex-direction:column;overflow:hidden}
#chatScroll{padding:28px 36px;overflow-y:scroll !important;height:0;flex:1 1 0px !important}
#chatScroll::-webkit-scrollbar{width:16px;display:block !important}
#chatScroll::-webkit-scrollbar-track{background:rgba(76,29,149,.1);border-radius:8px}
#chatScroll::-webkit-scrollbar-thumb{background:rgba(76,29,149,.3);border-radius:8px}
</style></head><body>
<div class="shell"><div class="main"><div class="ctr">
  <div id="chatScroll">
    <div style="height:2000px;background:linear-gradient(#f0f0f0,#e0e0e0)">长内容测试</div>
  </div>
</div></div></div>
</body></html>
