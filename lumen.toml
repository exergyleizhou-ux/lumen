default_model = "deepseek-chat"

[[providers]]
name = "deepseek"
kind = "openai"
base_url = "https://api.deepseek.com/v1"
model = "deepseek-chat"
# API key is read from the environment (or .env, which is gitignored) — never
# committed inline. Set DEEPSEEK_API_KEY in .env or your shell. See .env.example.
api_key_env = "DEEPSEEK_API_KEY"

# Optional: per-1M-token rates so the cost readout is accurate for THIS provider.
# Omit it and Lumen uses the built-in DeepSeek default. Add it under any provider
# (e.g. OpenAI/Anthropic) to see real spend for that provider.
# [providers.pricing]
# input = 0.14      # cache-miss input, per 1M tokens
# cache_hit = 0.014 # cached input, per 1M tokens
# output = 0.28     # completion, per 1M tokens
# currency = "USD"

[agent]
max_steps = 30
temperature = 0.7

# Verify-after-edit: after the agent edits files it auto-runs the project's
# build/lint/test and feeds failures back to the model to self-repair. Activates
# in any Go / JS-TS / Python project; the language is detected per changed file
# and uninstalled tools are skipped. Values below are the defaults.
[verify]
enabled = true             # master switch
command = ""               # override the whole plan; empty = auto-detect per language (Go build/vet/test · Python ruff/pytest · JS-TS tsc/jest)
scope = "changed-pkg"      # "changed-pkg" = test only changed packages/files; "all" = whole project
run_tests = true           # run tests (build+vet still run if false)
max_repair_cycles = 3      # self-repair attempts before handing back to you
