name: lumen-production

x-runtime: &runtime
  image: ${LUMEN_IMAGE:?pin LUMEN_IMAGE to an immutable digest}
  restart: unless-stopped
  read_only: true
  init: true
  security_opt:
    - no-new-privileges:true
  cap_drop: [ALL]
  environment: &runtime-env
    LUMEN_HOSTED: "true"
    WORKBENCH_JWT_SECRET: ${WORKBENCH_JWT_SECRET:?required}
    WORKBENCH_DATABASE_URL: ${WORKBENCH_DATABASE_URL:?required}
    WORKBENCH_OBJECT_DIR: /var/lib/lumen/objects
    HOSTED_WORKSPACE_ROOT: /var/lib/lumen/workspaces
    WORKBENCH_PARENT_ORIGIN: ${WORKBENCH_PARENT_ORIGIN:?required}
    WORKBENCH_CONTROL_PLANE_URL: ${WORKBENCH_CONTROL_PLANE_URL:?required}
    WORKBENCH_RUNTIME_INGEST_SECRET: ${WORKBENCH_RUNTIME_INGEST_SECRET:?required}
    OPENAI_API_KEY: ${LUMEN_PROVIDER_API_KEY:?required}
  volumes:
    - lumen_objects:/var/lib/lumen/objects
    - lumen_workspaces:/var/lib/lumen/workspaces
    - lumen_home:/home/lumen
  tmpfs:
    - /tmp:size=256m,mode=1777
  networks: [runtime]
  logging:
    driver: json-file
    options: {max-size: "20m", max-file: "5"}

services:
  migrate:
    image: ${MIGRATOR_IMAGE:?pin the Oasis migrator image to an immutable digest}
    profiles: [migrate]
    restart: "no"
    environment:
      DATABASE_URL: ${WORKBENCH_DATABASE_URL:?required}
    command: ["migrate", "up"]
    networks: [runtime]

  code:
    <<: *runtime
    command: ["serve", "--addr", "0.0.0.0:8080"]
    expose: ["8080"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s

  lab:
    <<: *runtime
    command: ["science", "lab", "--addr", "0.0.0.0:4310", "--no-browser"]
    expose: ["4310"]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4310/api/lab/readyz"]
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 15s

  caddy:
    image: caddy:2.8.4-alpine
    restart: unless-stopped
    read_only: true
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    ports:
      - "127.0.0.1:${LUMEN_PROXY_PORT:-8088}:8080"
    environment:
      LUMEN_CODE_HOST: ${LUMEN_CODE_HOST:?required}
      LUMEN_LAB_HOST: ${LUMEN_LAB_HOST:?required}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    tmpfs: [/config, /data]
    networks: [runtime]
    depends_on: [code, lab]

networks:
  runtime:
    internal: true

volumes:
  lumen_objects:
  lumen_workspaces:
  lumen_home:
