name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: build · vet · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      # The hard gate: compile + vet + tests must all pass.
      # gopls-dependent LSP tests self-skip when gopls is absent.
      - name: make check
        run: make check
