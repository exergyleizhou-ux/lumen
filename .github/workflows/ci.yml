name: Lumen CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: build + vet + test -race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Build
        run: GOTOOLCHAIN=local go build -o bin/lumen ./cmd/lumen

      - name: Vet
        run: GOTOOLCHAIN=local go vet ./...

      - name: Test (race)
        run: GOTOOLCHAIN=local go test -race -count=1 -timeout=90s ./...

      - name: Test controlled native integration
        run: GOTOOLCHAIN=local go test -tags=integration -p=2 -count=1 -timeout=180s ./internal/science/native ./internal/science/lab/runtime
