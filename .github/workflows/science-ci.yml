name: science-ci

on:
  push:
    branches: [main]
    paths:
      - 'internal/science/**'
      - 'scripts/test-science-*.sh'
      - 'scripts/science/**'
      - 'desktop/lumen-science/**'
      - '.gitleaks.toml'
      - 'Makefile'
  pull_request:
    branches: [main]
    paths:
      - 'internal/science/**'
      - 'scripts/test-science-*.sh'
      - 'scripts/science/**'
      - 'desktop/lumen-science/**'
      - '.gitleaks.toml'
      - 'Makefile'

jobs:
  science-quick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: science quick gate
        run: |
          export GOTOOLCHAIN=local
          bash scripts/test-science-quick.sh

  science-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz | tar xz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/
      - name: science all gate
        run: |
          export GOTOOLCHAIN=local
          bash scripts/test-science-all.sh
      - name: test count gate
        run: |
          COUNT=$(grep -r '^func Test' internal/science --include='*_test.go' | wc -l | tr -d ' ')
          test "$COUNT" -ge 120
      - name: RM offline auto
        run: |
          export GOTOOLCHAIN=local
          bash scripts/science/rm-offline-auto.sh
