name: science-gitleaks

on:
  push:
    paths:
      - 'internal/science/**'
      - '.gitleaks.toml'
      - 'scripts/test-science-*.sh'
  pull_request:
    paths:
      - 'internal/science/**'
      - '.gitleaks.toml'

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml